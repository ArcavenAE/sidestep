  # Reports Section
  /github/{owner}/actions/report:
    post:
      tags:
        - "Reports"
      summary: "Generate a security report"
      description: >
        Triggers generation of a PDF security report for a GitHub organization.
        Returns immediately with a report ID — use the GET endpoint to poll for completion.
