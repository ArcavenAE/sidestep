                    name: myorg
                    repos:
                    - apply_to_repo: true
                      name: frontend-app
                    - apply_to_repo: true
                      name: backend-api
                    - apply_to_repo: true
                      name: shared-libs
              attach_to_organization:
                summary: Attach to Entire Organization
                description: Attach policy to entire organization (all repositories and workflows)
                value:
                  org:
                    apply_to_org: true
                    name: myorg
              attach_to_mixed_targets:
                summary: Attach to Mixed Targets
                description: Attach policy to combination of specific workflows and entire repositories
                value:
                  org:
                    apply_to_org: false
                    name: myorg
                    repos:
                    - apply_to_repo: true
                      name: frontend-app
                    - apply_to_repo: false
                      name: backend-api
                      workflows:
                      - ci.yml
                      - security-scan.yml
