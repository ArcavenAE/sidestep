    post:
      tags:
      - Settings
      summary: Update notification settings for workflow runs
      description: |
        Configure notification settings for GitHub Actions workflow runs. Supports two Slack notification methods:
        - **webhook**: Uses traditional webhook URL (requires slackWebhookURL)
        - **oauth**: Uses Slack OAuth integration (requires slackChannelID)

        Note: When using OAuth method, the Slack app must be installed in your workspace first.
      operationId: updateNotificationSettings
      parameters:
      - in: path
        name: owner
        description: GitHub organization or user name
        required: true
        schema:
          type: string
        example: myorg
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationSettings'
            examples:
              webhook_method:
                summary: Slack Webhook Method
                value:
                  email: security@example.com
                  exemptFiles: null
                  notifyForArtifactSecretsDetection: 'true'
                  notifyForBlockedRunPolicy: ''
                  notifyForHardenRunnerConfigChanged: ''
                  notifyForHttpsDetections: 'true'
                  notifyForImposterCommitsDetection: ''
                  notifyForNonCompliantArtifacts: ''
                  notifyForSecretsDetection: 'true'
                  notifyForSuspiciousNetworkCall: ''
                  notifyForSuspiciousProcessEvents: ''
                  notifyOnFileOverwrite: 'true'
                  notifyWhenDomainBlocked: 'true'
                  notifyWhenEndpointDiscovered: 'true'
                  owner: myorg
                  repo: '*'
                  slackChannelID: ''
                  slackNotificationMethod: webhook
                  slackWebhookURL: https://hooks.slack.com/services/SLACK-TEAM-EXAMPLE/SLACK-BOT-EXAMPLE/SLACK-WEBHOOK-EXAMPLE
                  teamsWebhookURL: ''
              oauth_method:
                summary: Slack OAuth Method
                value:
                  email: security@example.com
                  exemptFiles: null
                  notifyForArtifactSecretsDetection: 'true'
                  notifyForBlockedRunPolicy: ''
                  notifyForHardenRunnerConfigChanged: ''
