        updated_at:
          type: string
          format: date-time
          description: "When the incident record was last updated"
          example: "2024-01-16T15:00:00Z"

    GitHubOwnerHardenRunnerCoverageResponse:
      type: object
      description: "Daily coverage metrics for a specific GitHub organization/owner"
      patternProperties:
        "^[0-9]{4}-[0-9]{2}-[0-9]{2}$":
          type: object
          description: "Coverage data for a specific date (YYYY-MM-DD format)"
