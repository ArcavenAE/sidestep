                      maintained_action_name: "step-security/maintained-retry"
                      email_from_api: "user@example.com"
                      email_from_user: "user@example.com"
                      login: "github-user"
                      status: "onboarded"
                      requested_at: 1704067200
                      onboarded_at: 1704153600
                alternate_recommended_state:
                  summary: "Alternate Recommended State Example"
                  description: "When a customer requests an action and an alternate action from GitHub is recommended"
                  value:
                    - owner: "step-security"
                      action_name: "tibdex/github-app-token"
                      maintained_action_name: ""
                      email_from_api: "user@example.com"
                      email_from_user: ""
                      login: "github-user"
                      status: "alternate_recommended"
                      requested_at: 1704067200
                      onboarded_at: 0
                not_recommended_state:
