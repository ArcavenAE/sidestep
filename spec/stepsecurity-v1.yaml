  /{customer}/users:
    get:
      tags:
      - Admin Console
      summary: Get organization members
      description: Retrieve all members of the customer organization
      operationId: get_customer_users
      parameters:
      - in: path
        name: customer
        description: Customer organization identifier
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: Successfully retrieved members
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
    post:
      tags:
      - Admin Console
      summary: Add organization member
      description: Add a new member to the customer/organization with specific access policies
      operationId: post_customer_users
      parameters:
      - in: path
        name: customer
        description: Customer organization identifier
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_names:
                  example:
                  - temp-1
                  description: List of usernames to add
                  type: array
                  items:
                    type: string
                auth_type:
                  example: Github
                  description: Authentication method for the user
                  type: string
                  enum:
                  - Github
                  - SSO
                email_suffixes:
                  example: '@company.com'
                  description: 'Email suffixes restriction (optional). **WARNING**: When specified, this grants access to ALL GitHub users with the matching email suffix, not just the users listed in user_names.'
                  type: array
                  items:
                    type: string
                policies:
                  description: List of access policies for the user
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        example: github
                        description: Platform type
                        type: string
                        enum:
                        - github
                      scope:
                        example: organization
                        description: Access scope level
                        type: string
                        enum:
                        - customer
                        - organization
                      role:
                        example: admin
                        description: Role permissions
                        type: string
                        enum:
                        - admin
                        - auditor
                      organization:
                        example: test-org
                        description: Organization name (required when scope is 'organization')
                        type: string
                    required:
                    - type
                    - scope
                    - role
              required:
              - user_names
              - auth_type
              - policies
            examples:
              github_org_auditor:
                summary: GitHub Organization Auditor
                description: Provides auditor access to a specific GitHub organization
                value:
                  auth_type: Github
                  policies:
                  - organization: my-company
                    role: auditor
                    scope: organization
                    type: github
                  user_names:
                  - john-doe
              github_org_admin:
                summary: GitHub Organization Admin
                description: Provides admin access to a specific GitHub organization
                value:
                  auth_type: Github
                  policies:
                  - organization: my-company
                    role: admin
                    scope: organization
                    type: github
                  user_names:
                  - jane-admin
              github_customer_admin:
                summary: GitHub Customer Admin
                description: Provides admin access across all GitHub organizations for the customer
                value:
                  auth_type: Github
                  policies:
                  - role: admin
                    scope: customer
                    type: github
                  user_names:
                  - jane-admin
              github_org_admin_with_sso:
                summary: Github Organization Admin With SSO
                description: Provides admin access to a specific GitHub organization
                value:
                  auth_type: SSO
                  emails:
                  - jane@org-admin.com
                  policies:
                  - organization: my-company
                    role: admin
                    scope: organization
                    type: github
              email_suffix_access:
                summary: Email Suffix-Based Access
                description: '⚠️ **WARNING**: Grants access to ALL GitHub users with @company.com email addresses. Use with extreme caution as this can provide access to many users beyond those listed in user_names.'
                value:
                  auth_type: Github
                  email_suffixes:
                  - '@company.com'
                  policies:
                  - organization: my-company
                    role: auditor
                    scope: organization
                    type: github
        required: true
      responses:
        '201':
          description: All members added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    example: All user(s) added successfully
                    type: string
                  users_added:
                    example:
                    - user1
                    - user2
                    type: array
                    items:
                      type: string
                  total_added:
                    example: 2
                    type: integer
        '207':
          description: Multi-status - Some members added successfully, others failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    example: 'Partial success: some users added, others failed'
                    type: string
                  users_added:
                    example:
                    - user1
                    type: array
                    items:
                      type: string
                  users_failed:
                    example:
                    - error: User already exists
                      username: user2
                    type: array
                    items:
                      type: object
                      properties:
                        username:
                          type: string
                        error:
                          type: string
                  total_added:
                    example: 1
                    type: integer
                  total_failed:
                    example: 1
                    type: integer
        '400':
          description: Bad request - invalid payload or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized - invalid or missing authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '403':
          description: Forbidden - insufficient permissions to add users with specified roles/scopes
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    example: Insufficient permissions
                    type: string
                  message:
                    example: You do not have permission to grant admin access to this organization
                    type: string
        '500':
