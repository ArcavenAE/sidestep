openapi: "3.0.0"
info:
  version: "1.0.0"
  title: "Step Security API"
  description: "API for interacting with Step Security's services. This API provides comprehensive GitHub Actions security monitoring, GitLab integration, and enterprise management capabilities."
servers:
  - url: "https://agent.api.stepsecurity.io/v1"
    description: "Production API Server"
components:
  securitySchemes:
    BearerAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Use 'Bearer {api_key}' format

  schemas:
    APIError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    WorkflowRun:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        repo:
          type: string
        path:
          type: string
        conclusion:
          type: string
        title:
          type: string
        committer:
          type: string
        head_branch:
          type: string
        start_time_utc:
          type: integer
        execution_duration_in_seconds:
          type: integer
        runtime_security_status:
          type: string
        event:
          type: string
        run_number:
          type: integer
        egress_policies:
          type: object

    Detection:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        owner:
          type: string
        repo:
          type: string
        workflow_id:
          type: string
        workflow_path:
          type: string
        run_id:
          type: string
        file:
          type: string
          nullable: true
        timestamp:
          type: string
        detection:
          type: string
        secret:
          type: string
        line_number:
          type: string
        rule_id:
          type: string
        job_name:
          type: string
        step_number:
          type: string
        expected_outbound_connections:
          type: array
          items:
            type: string
        method:
          type: string
        host:
          type: string
        path:
          type: string
        id_timestamp:
          type: string
        severity:
          type: string
        runtime_security_status:
          type: string
        owner_repo:
          type: string
        process_events:
          type: array
          items:
            type: object
        suspicious_npm_pkg_upgrade:
          type: object
          additionalProperties: true
        is_suppressed:
          type: boolean
          example: false
        suppress_rule_id:
          type: string
        suppressed_by:
          type: string
        suppress_reason:
          type: string
        tool:
          type: object
          properties:
            name:
              type: string
            sha256:
              type: string
            parent:
              type: string
        direct_ip_address:
          type: string
        html_url:
          type: string
        ttl:
          type: integer
          format: int64
        is_resolved:
          type: boolean
          example: false
        resolved_by:
          type: string
        resolved_reason:
          type: string
        is_lockdown:
          type: boolean
          description: "Job was blocked by lockdown mode"
        actions_not_allowed:
          type: array
          items:
            type: string
        runs_on_labels_not_allowed:
          type: array
          items:
            type: string
        secrets_policy_status:
          type: string
        workflow_contains_secrets:
          type: string
        is_non_default_branch:
          type: string
        workflow_matches_default_ref:
          type: string
        current_branch_hash:
          type: string
        default_branch_hash:
          type: string
        compromised_actions_detected:
          type: array
          items:
            type: string
        run_attempt:
          type: integer
        customer_id_status:
          type: string
        owner_id_status:
          type: string
        owner_repo_id_status:
          type: string

    Policy:
      type: object
      properties:
        owner:
          type: string
          description: "GitHub organization owner"
          example: "myorg"
        policyName:
          type: string
          description: "Name of the policy"
          example: "security-policy"
        attachments:
          $ref: "#/components/schemas/PolicyAttachments"
          description: "Policy attachment configuration"
        allowed_endpoints:
          type: array
          items:
            type: string
          nullable: true
          description: "List of allowed network endpoints"
        egress_policy:
          type: string
          description: "Egress policy configuration"
        disable_telemetry:
          type: boolean
          description: "Whether to disable telemetry collection"
        disable_sudo:
          type: boolean
          description: "Whether to disable sudo access"
        disable_file_monitoring:
          type: boolean
          description: "Whether to disable file system monitoring"

    RunPolicyEvaluation:
      type: object
      properties:
        owner:
          type: string
          description: "GitHub organization owner"
          example: "step-security"
        repo_full_name:
          type: string
          description: "Full repository name"
          example: "step-security/arm-int-tests"
        repo_workflow:
          type: string
          description: "Unique workflow identifier"
          example: "repo#step-security/arm-int-tests#workflow#.github/workflows/poc_workflow.yml"
        head_branch:
          type: string
          description: "Branch name where the workflow ran"
          example: "main"
        workflow_name:
          type: string
          description: "Name of the workflow"
          example: "Workflow for POCs"
        workflow_display_title:
          type: string
          description: "Display title of the workflow run"
          example: "Workflow for POCs"
        workflow_file_path:
          type: string
          description: "Path to the workflow file"
          example: ".github/workflows/poc_workflow.yml"
        run_id:
          type: integer
          description: "Workflow run ID"
          example: 16595543716
        workflow_run_started_at:
          type: integer
          description: "Unix timestamp (seconds) when the workflow run started. Use this field to filter out older entries in your application logic by comparing against a specific timestamp threshold."
          example: 1753790675
        commit_message:
          type: string
          description: "Commit message that triggered the workflow"
          example: "Create precommit-policy-based-prs.yml"
        committer:
          type: string
          description: "Name of the committer"
          example: "vamshi-stepsecurity"
        event:
          type: string
          description: "Event that triggered the workflow"
          example: "workflow_dispatch"
        run_number:
          type: integer
          description: "Sequential run number for the workflow"
          example: 756
        policy_results:
          type: array
          description: "Array of policy evaluation results"
          items:
            type: object
            properties:
              policy:
                type: object
                description: "Policy configuration details"
                properties:
                  owner:
                    type: string
                    example: "step-security"
                  name:
                    type: string
                    example: "compromised actions policy"
                  enable_compromised_actions_policy:
                    type: boolean
                    example: true
                  enable_action_policy:
                    type: boolean
                    example: true
                  enable_secrets_policy:
                    type: boolean
                    example: true
                  enable_runs_on_policy:
                    type: boolean
                    example: true
                  is_dry_run:
                    type: boolean
                    description: "Indicates if the policy is in dry run mode"
                    example: true
                  allowed_actions:
                    type: object
                    description: "Map of allowed actions and their permissions"
                    additionalProperties:
                      type: string
                    example:
                      "actions/checkout": "allow"
                      "step-security/harden-runner": "allow"
                  require_pinned_actions:
                    type: boolean
                    description: "When true and enable_action_policy is true, all actions must be pinned to a full-length commit SHA"
                    example: true
                  pinned_actions_exemptions:
                    type: array
                    description: "Actions exempted from the pinning requirement. Supports exact match (org/repo@v4), name-only (org/repo), and owner wildcard (org/*)"
                    items:
                      type: string
                    example:
                      - "actions/*"
                      - "some-org/some-action@v4"
                  disallowed_runner_labels:
                    type: object
                    description: "Map of disallowed runner labels"
                    additionalProperties:
                      type: object
                    example:
                      "windows-latest": {}
                  enable_harden_runner_policy:
                    type: boolean
                    example: true
                  harden_runner_labels:
                    type: array
                    description: "Runner labels to match against. When empty, the policy applies to all jobs. When non-empty, only jobs whose runs-on contains one of these labels are evaluated. Matching is exact and case-sensitive."
                    items:
                      type: string
                    example:
                      - "ubuntu-latest"
                      - "self-hosted"
                  harden_runner_custom_actions:
                    type: array
                    description: "Additional action refs accepted as valid harden runner equivalents. Version tags are ignored when matching."
                    items:
                      type: string
                    example:
                      - "my-org/bootstrap-security"
              action_policy_status:
                type: string
                enum:
                  - Allowed
                  - Blocked
                  - DryRunBlocked
                  - NotApplicable
                example: "NotApplicable"
              runs_on_policy_status:
                type: string
                enum:
                  - Allowed
                  - Blocked
                  - DryRunBlocked
                  - NotApplicable
                example: "NotApplicable"
              compromised_actions_policy_status:
                type: string
                enum:
                  - Allowed
                  - Blocked
                  - DryRunBlocked
                  - NotApplicable
                example: "DryRunBlocked"
              compromised_actions_detected:
                type: array
                description: "List of compromised actions detected (present when compromised_actions_policy_status is Blocked or DryRunBlocked)"
                items:
                  type: string
                example:
                  - "step-security/dummy-compromised-action@v1"
              secrets_policy_status:
                type: string
                enum:
                  - Allowed
                  - Blocked
                  - DryRunBlocked
                  - NotApplicable
                example: "NotApplicable"
              actions_not_pinned:
                type: array
                description: "List of actions not pinned to a full-length commit SHA (present when action_policy_status is Blocked or DryRunBlocked and require_pinned_actions is true)"
                items:
                  type: string
                example:
                  - "actions/checkout@v4"
                  - "custom-org/deploy@latest"
              runs_on_labels_not_allowed:
                type: array
                description: "List of runner labels that are not allowed (present when runs_on_policy_status is Blocked or DryRunBlocked)"
                items:
                  type: string
                example:
                  - "windows-latest"
              harden_runner_policy_status:
                type: string
                enum:
                  - Allowed
                  - Blocked
                  - DryRunBlocked
                  - NotApplicable
                example: "NotApplicable"
              harden_runner_jobs_not_protected:
                type: array
                description: "Jobs where the harden runner action is completely missing (present when harden_runner_policy_status is Blocked or DryRunBlocked)"
                items:
                  type: string
                example:
                  - ".github/workflows/ci.yml::build"
              harden_runner_jobs_misconfigured:
                type: array
                description: "Jobs where the harden runner action exists but is not the first step (present when harden_runner_policy_status is Blocked or DryRunBlocked)"
                items:
                  type: string
                example:
                  - ".github/workflows/ci.yml::test"
        status:
          type: string
          description: "Overall policy evaluation status for the workflow run"
          enum:
            - Allowed
            - Blocked
            - DryRunBlocked
          example: "DryRunBlocked"
        owner_status:
          type: string
        full_repo_name_status:
          type: string
        customer_status:
          type: string

    PolicyAttachmentRequest:
      type: object
      properties:
        org:
          $ref: "#/components/schemas/PolicyOrganization"
          description: "Organization-level attachment configuration"
        clusters:
          type: array
          items:
            type: string
          description: "List of cluster names for cluster-level attachments"
          example: ["production-k8s-cluster", "staging-docker-runners"]

    PolicyAttachmentResponse:
      type: object
      properties:
        message:
          type: string
          description: "Success message"
          example: "Policy attached successfully"

    PolicyRepository:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: "Repository name"
          example: "frontend-app"
        apply_to_repo:
          type: boolean
          description: "Whether the policy applies to the entire repository"
          default: false
          example: true
        workflows:
          type: array
          items:
            type: string
          description: "List of specific workflow files (without .github/workflows/ prefix)"
          example: ["ci.yml", "deploy.yml"]

    PolicyOrganization:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: "Organization name"
          example: "myorg"
        apply_to_org:
          type: boolean
          description: "Whether the policy applies to the entire organization"
          default: false
          example: true
        repos:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRepository"
          description: "List of repositories within the organization"

    PolicyAttachments:
      type: object
      properties:
        org:
          $ref: "#/components/schemas/PolicyOrganization"
          description: "Organization-level attachments"
        clusters:
          type: array
          items:
            type: string
          description: "List of cluster names for cluster-level attachments"
          example: ["production-k8s-cluster", "staging-docker-runners"]

    SecuritySummary:
      type: object
      properties:
        Owner:
          type: string
        Repo:
          type: string
        IssueCount:
          type: integer
        ActionCount:
          type: integer
        DetectionCount:
          type: integer
        ProvenanceCount:
          type: integer
        SecretCount:
          type: integer
        RepoVisibility:
          type: string

    ActionsGovernanceMetricsResponse:
      type: object
      properties:
        tenant_name:
          type: string
          description: "Tenant name (populated for tenant-level queries)"
        owner:
          type: string
          description: "Organization name (populated for org-level queries)"
        date_range:
          type: object
          properties:
            start_date:
              type: string
              format: date
            end_date:
              type: string
              format: date
        todays_data:
          $ref: "#/components/schemas/ActionsGovernanceStatsWithTrend"
        daily_data:
          type: array
          items:
            $ref: "#/components/schemas/ActionsGovernanceStats"

    ActionsGovernanceStatsWithTrend:
      type: object
      description: "Current governance stats with trend values comparing to start of date range"
      properties:
        risky_actions_count:
          type: integer
          description: "Number of unique actions with low security scores"
        risky_action_usages:
          type: integer
          description: "Total usages of risky actions across workflows"
        weighted_average_score:
          type: number
          format: float
          description: "Usage-weighted average security score across all actions"
        unique_actions_average_score:
          type: number
          format: float
          description: "Simple average security score across unique actions"
        unique_actions_count:
          type: integer
          description: "Number of unique actions in use"
        total_actions_count:
          type: integer
          description: "Total action usages (including duplicates across workflows)"
        repo_count:
          type: integer
          description: "Number of repositories using actions"
        maintained_actions_count:
          type: integer
          description: "Number of unique StepSecurity maintained actions in use"
        maintained_actions_usages:
          type: integer
          description: "Total usages of maintained actions"
        coverage_percentage:
          type: number
          format: float
          description: "Percentage of action usages covered by maintained actions"
        risky_actions_trend:
          type: number
          format: float
          description: "Change in risky actions count from start of date range"
        weighted_average_score_trend:
          type: number
          format: float
          description: "Change in weighted average score from start of date range"
        unique_actions_average_score_trend:
          type: number
          format: float
        unique_actions_count_trend:
          type: number
          format: float
        maintained_actions_count_trend:
          type: number
          format: float
        coverage_trend:
          type: number
          format: float
          description: "Change in coverage percentage from start of date range"

    ActionsGovernanceStats:
      type: object
      description: "Daily governance stats snapshot"
      properties:
        date:
          type: string
          format: date
        risky_actions_count:
          type: integer
        risky_action_usages:
          type: integer
        weighted_average_score:
          type: number
          format: float
        unique_actions_average_score:
          type: number
          format: float
        unique_actions_count:
          type: integer
        total_actions_count:
          type: integer
        repo_count:
          type: integer
        maintained_actions_count:
          type: integer
        maintained_actions_usages:
          type: integer
        coverage_percentage:
          type: number
          format: float

    EndpointObservation:
      properties:
        job:
          type: string
        repo:
          type: string
        run_id:
          type: string
        timestamp:
          type: string
        workflow_file_name:
          type: string
      type: object

    GitHubBaselineChangeLog:
      properties:
        full_repo_name:
          type: string
        new_endpoints:
          items:
            type: string
          type: array
        run_id:
          type: string
        timestamp:
          type: string
      type: object

    GitHubBaselineChanges:
      properties:
        last_updated_at:
          type: string
        logs:
          items:
            $ref: "#/components/schemas/GitHubBaselineChangeLog"
          type: array
      type: object

    RepoJobRunEndpointAggregation:
      properties:
        baseline_status:
          type: string
        change_log:
          $ref: "#/components/schemas/GitHubBaselineChanges"
        endpoints:
          items:
            $ref: "#/components/schemas/WorkflowRunEndpoint"
          type: array
        owner:
          type: string
        repo:
          type: string
        total_workflow_runs:
          type: integer
        total_workflow_runs_since_last_change:
          type: integer
      type: object

    WorkflowRunEndpoint:
      properties:
        called_by:
          items:
            type: string
          type: array
        endpoint:
          type: string
        endpoint_observations:
          items:
            $ref: "#/components/schemas/EndpointObservation"
          type: array
        first_seen:
          type: string
        friendlyName:
          type: string
        last_seen:
          type: string
        total_calls:
          type: integer
        total_workflow_runs:
          type: integer
      type: object

    HardenRunnerConfigChangeDetails:
      properties:
        current_harden_runner_job_config:
          $ref: "#/components/schemas/HardenRunnerJobConfig"
        previous_harden_runner_job_config:
          $ref: "#/components/schemas/HardenRunnerJobConfig"
        total_workflow_runs_since_last_config_change:
          type: integer
        workflow_run_actor_login:
          type: string
      type: object

    HardenRunnerConfigChangedRecord:
      properties:
        config_change_details:
          $ref: "#/components/schemas/HardenRunnerConfigChangeDetails"
        detection_timestamp:
          type: string
        job_id:
          type: string
        run_id:
          type: string
      type: object

    HardenRunnerJobConfig:
      properties:
        allowed_endpoints:
          items:
            type: string
          type: array
        egress_policy:
          type: string
        job_id:
          type: string
        policy:
          type: string
        run_id:
          type: string
      type: object

    JobTokenPermissions:
      properties:
        actions:
          type: string
        checks:
          type: string
        contents:
          type: string
        deployments:
          type: string
        id-token:
          type: string
        issues:
          type: string
        metadata:
          type: string
        packages:
          type: string
        pages:
          type: string
        pull-requests:
          type: string
        repository-projects:
          type: string
        security-events:
          type: string
        statuses:
          type: string
      type: object

    WorkflowJobRunAggregatedEndpoint:
      properties:
        called_by:
          items:
            type: string
          type: array
        endpoint:
          type: string
        endpoint_observations:
          items:
            $ref: "#/components/schemas/WorkflowJobRunEndpointObservation"
          type: array
        first_seen:
          type: string
        is_deleted:
          type: boolean
        last_seen:
          type: string
        total_calls:
          type: integer
      type: object

    WorkflowJobRunEndpointAggregation:
      properties:
        allowed_endpoints:
          items:
            type: string
          type: array
        baseline_status:
          type: string
        change_log:
          $ref: "#/components/schemas/GitHubBaselineChanges"
        egress_policy:
          type: string
        endpoints:
          items:
            $ref: "#/components/schemas/WorkflowJobRunAggregatedEndpoint"
          type: array
        environment_type:
          type: string
        harden_runner_config_changed_records:
          items:
            $ref: "#/components/schemas/HardenRunnerConfigChangedRecord"
          type: array
        job:
          type: string
        job_token_permissions:
          $ref: "#/components/schemas/JobTokenPermissions"
        last_job_id:
          type: string
        last_run_id:
          type: string
        owner:
          type: string
        policy:
          type: string
        repo:
          type: string
        total_workflow_runs:
          type: integer
        total_workflow_runs_since_last_change:
          type: integer
        total_workflow_runs_since_last_config_change:
          type: integer
        workflow_file_name:
          type: string
        workflow_job_identifier:
          type: string
      type: object

    WorkflowJobRunEndpointObservation:
      properties:
        run_id:
          type: string
        timestamp:
          type: string
      type: object

    OwnerJobRunEndpointAggregation:
      type: object
      properties:
        owner:
          type: string
        total_workflow_runs:
          type: integer
        total_workflow_runs_since_last_change:
          type: integer
        endpoints:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowRunEndpoint"
        baseline_status:
          type: string
        change_log:
          $ref: "#/components/schemas/GitHubBaselineChanges"
        total_endpoints:
          type: integer

    ClusterJobRunEndpointAggregation:
      type: object
      properties:
        customer_name:
          type: string
        cluster_name:
          type: string
        environment_type:
          type: string
        total_workflow_runs:
          type: integer
        total_workflow_runs_since_last_change:
          type: integer
        endpoints:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowRunEndpoint"
        baseline_status:
          type: string
        change_log:
          $ref: "#/components/schemas/GitHubBaselineChanges"
        total_endpoints:
          type: integer

    HardenRunnerCoverageResponse:
      type: object
      properties:
        tenant_name:
          type: string
          description: "Name of the tenant/customer"
          example: "enterprise-customer-001"
        date_range:
          $ref: "#/components/schemas/DateRange"
        summary:
          $ref: "#/components/schemas/CoverageStats"
        today:
          $ref: "#/components/schemas/CoverageStats"
          nullable: true
          description: "Today's coverage statistics (if available)"
        daily_data:
          type: array
          items:
            $ref: "#/components/schemas/DailyCoverage"
          description: "Daily coverage data for the requested period"
        orgs:
          type: array
          items:
            $ref: "#/components/schemas/OrgSummary"
          nullable: true
          description: "Organization-level coverage summaries"
        servers:
          type: array
          items:
            $ref: "#/components/schemas/ServerSummary"
          nullable: true
          description: "Server-level coverage summaries"

    DateRange:
      type: object
      properties:
        start_date:
          type: string
          format: date
          description: "Start date of the coverage period"
          example: "2024-01-01"
        end_date:
          type: string
          format: date
          description: "End date of the coverage period"
          example: "2024-01-31"

    CoverageStats:
      type: object
      properties:
        monitored_runs:
          type: integer
          description: "Number of monitored workflow runs"
          example: 245
        unmonitored_runs:
          type: integer
          description: "Number of unmonitored workflow runs"
          example: 78
        total_runs:
          type: integer
          description: "Total number of workflow runs"
          example: 323
        coverage_percentage:
          type: number
          format: float
          description: "Coverage percentage (0-100)"
          example: 75.85

    DailyCoverage:
      type: object
      allOf:
        - type: object
          properties:
            date:
              type: string
              format: date
              description: "Date of the coverage data"
              example: "2024-01-15"
        - $ref: "#/components/schemas/CoverageStats"

    OrgSummary:
      type: object
      properties:
        name:
          type: string
          description: "Organization name"
          example: "my-organization"
        total_runs:
          type: integer
          description: "Total workflow runs for this organization"
          example: 150
        monitored_runs:
          type: integer
          description: "Monitored workflow runs for this organization"
          example: 120
        coverage:
          type: number
          format: float
          description: "Coverage percentage for this organization"
          example: 80.0
        trend:
          type: number
          format: float
          description: "Coverage trend (positive/negative percentage change)"
          example: 5.2

    ServerSummary:
      type: object
      properties:
        name:
          type: string
          description: "Server name"
