              example: 0
            total_runs:
              type: integer
              description: "Total number of workflow runs for this date"
              example: 2
            coverage_percentage:
              type: number
              format: float
              description: "Coverage percentage for this date (0-100)"
              example: 100
            trend:
              type: number
              format: float
              description: "Coverage trend compared to previous period"
              example: 0
            repositories:
              type: object
              description: "Repository-level breakdown of coverage metrics"
              patternProperties:
                ".*":
                  type: object
                  description: "Coverage data for a specific repository"
                  properties:
                    monitored_runs:
                      type: integer
                      description: "Number of monitored runs for this repository"
                      example: 2
                    unmonitored_runs:
                      type: integer
                      description: "Number of unmonitored runs for this repository"
                      example: 0
                    total_runs:
                      type: integer
                      description: "Total runs for this repository"
                      example: 2
                    coverage_percentage:
                      type: number
                      format: float
                      description: "Coverage percentage for this repository"
                      example: 100
                    workflows:
                      type: object
                      description: "Workflow-level breakdown of coverage metrics"
                      patternProperties:
                        ".*":
                          type: object
                          description: "Coverage data for a specific workflow"
                          properties:
                            monitored_runs:
                              type: integer
                              description: "Number of monitored runs for this workflow"
                              example: 2
                            unmonitored_runs:
                              type: integer
                              description: "Number of unmonitored runs for this workflow"
                              example: 0
                            total_runs:
                              type: integer
                              description: "Total runs for this workflow"
                              example: 2
                            coverage_percentage:
                              type: number
                              format: float
                              description: "Coverage percentage for this workflow"
                              example: 100
                            workflow_name:
                              type: string
                              description: "Human-readable name of the workflow"
                              example: "CI Pipeline"
                            jobs:
                              type: object
                              description: "Job-level breakdown of coverage metrics"
                              patternProperties:
                                ".*":
                                  type: object
                                  description: "Coverage data for a specific job"
                                  properties:
                                    monitored_runs:
                                      type: integer
                                      description: "Number of monitored runs for this job"
                                      example: 2
                                    unmonitored_runs:
                                      type: integer
                                      description: "Number of unmonitored runs for this job"
                                      example: 0
                                    total_runs:
                                      type: integer
                                      description: "Total runs for this job"
                                      example: 2
                                    coverage_percentage:
                                      type: number
                                      format: float
                                      description: "Coverage percentage for this job"
                                      example: 100

