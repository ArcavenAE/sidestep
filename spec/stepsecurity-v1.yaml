  # Settings Section
  /github/{owner}/*/actions/runs/notification-settings:
    get:
      tags:
        - "Settings"
      summary: "Get notification settings for workflow runs"
      description: "Retrieve notification settings for a GitHub organization or specific repository. Use '*' as the repository parameter to get organization-level settings."
      operationId: "getNotificationSettings"
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
          description: "GitHub organization or user name"
          example: "myorg"
      responses:
        "200":
          description: "Notification settings retrieved successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
        "400":
          description: "Bad Request - Invalid parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "401":
          description: "Unauthorized - Invalid or missing API key"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "403":
          description: "Forbidden - Insufficient permissions"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "404":
          description: "Organization not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "500":
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

    post:
      tags:
        - "Settings"
      summary: "Update notification settings for workflow runs"
      description: |
        Configure notification settings for GitHub Actions workflow runs. Supports two Slack notification methods:
        - **webhook**: Uses traditional webhook URL (requires slackWebhookURL)
        - **oauth**: Uses Slack OAuth integration (requires slackChannelID)

        Note: When using OAuth method, the Slack app must be installed in your workspace first.
      operationId: "updateNotificationSettings"
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
          description: "GitHub organization or user name"
          example: "myorg"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettings"
            examples:
              webhook_method:
                summary: "Slack Webhook Method"
                value:
                  owner: "myorg"
                  repo: "*"
                  slackWebhookURL: "https://hooks.slack.com/services/SLACK-TEAM-EXAMPLE/SLACK-BOT-EXAMPLE/SLACK-WEBHOOK-EXAMPLE"
                  teamsWebhookURL: ""
                  email: "security@example.com"
                  notifyWhenDomainBlocked: "true"
                  notifyOnFileOverwrite: "true"
                  notifyWhenEndpointDiscovered: "true"
                  notifyForHttpsDetections: "true"
                  notifyForSecretsDetection: "true"
                  notifyForArtifactSecretsDetection: "true"
                  notifyForImposterCommitsDetection: ""
                  notifyForSuspiciousNetworkCall: ""
                  notifyForSuspiciousProcessEvents: ""
                  notifyForHardenRunnerConfigChanged: ""
                  notifyForNonCompliantArtifacts: ""
                  notifyForBlockedRunPolicy: ""
                  exemptFiles: null
                  slackNotificationMethod: "webhook"
                  slackChannelID: ""
              oauth_method:
                summary: "Slack OAuth Method"
                value:
                  owner: "myorg"
                  repo: "*"
                  slackWebhookURL: ""
                  teamsWebhookURL: ""
                  email: "security@example.com"
                  notifyWhenDomainBlocked: "true"
                  notifyOnFileOverwrite: "true"
                  notifyWhenEndpointDiscovered: "true"
                  notifyForHttpsDetections: "true"
                  notifyForSecretsDetection: "true"
                  notifyForArtifactSecretsDetection: "true"
                  notifyForImposterCommitsDetection: ""
                  notifyForSuspiciousNetworkCall: ""
                  notifyForSuspiciousProcessEvents: ""
                  notifyForHardenRunnerConfigChanged: ""
                  notifyForNonCompliantArtifacts: ""
                  notifyForBlockedRunPolicy: ""
                  exemptFiles: null
                  slackNotificationMethod: "oauth"
                  slackChannelID: "C076L4GG1S9"
      responses:
        "200":
          description: "Notification settings updated successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Notification settings updated successfully"
        "400":
          description: "Bad Request - Invalid parameters or missing required fields"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "401":
          description: "Unauthorized - Invalid or missing API key"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "403":
          description: "Forbidden - Insufficient permissions"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "404":
          description: "Organization not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "500":
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  # Apps & PATs Section
  /github/{owner}/apps:
    get:
      tags:
        - "Apps & PATs"
      summary: "Get GitHub Apps and Personal Access Tokens for organization"
      description: "Retrieve comprehensive posture data including GitHub Apps, Fine-grained PATs, and Classic PATs for a specific organization. Supports pagination, search, filtering by type, and advanced filters."
      operationId: "getAppsForOrganization"
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          description: "GitHub organization name"
          schema:
            type: string
          example: "acme-corp"
        - name: page
          in: query
          required: false
          description: "Page number for pagination (default: 1)"
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: page_size
          in: query
          required: false
          description: "Number of items per page (default: 100, max: 200)"
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
          example: 50
        - name: search
          in: query
          required: false
          description: "Search query to filter apps and tokens by name or other text fields"
          schema:
            type: string
          example: "my-app"
        - name: type
          in: query
          required: false
          description: "Filter by resource type (default: all)"
          schema:
            type: string
            enum: ["all", "github_apps", "fine_grained_pats", "classic_pats"]
            default: "all"
          example: "github_apps"
        - name: filter
          in: query
          required: false
          description: "JSON object containing filter criteria. Supports: permissions (array), access (string), scopes (array), status (string), token_owners (array), last_used_after (RFC3339), last_used_before (RFC3339)"
          schema:
            type: string
          example: '{"status":"active","permissions":["contents:write"]}'
      responses:
        "200":
          description: "Successfully retrieved app posture data"
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    type: string
                    description: "Organization name"
                    example: "acme-corp"
                  customer:
                    type: string
                    description: "Customer identifier"
                    example: "customer-001"
                  last_updated_at:
                    type: string
                    description: "Last time the data was updated (RFC3339 format)"
                    example: "2026-01-27T10:30:00Z"
                  sso_enabled:
                    type: boolean
                    description: "Whether SAML SSO is enabled for the organization"
                    example: true
                  github_apps:
                    type: array
                    description: "List of GitHub App installations"
                    items:
                      type: object
                      properties:
                        app_id:
                          type: integer
                          example: 123456
                        app_name:
                          type: string
                          example: "My GitHub App"
                        app_slug:
                          type: string
                          example: "my-github-app"
                        app_owner:
                          type: string
                          example: "app-publisher"
                        installation_id:
                          type: integer
                          example: 789012
                        permissions:
                          type: object
                          additionalProperties:
                            type: string
                          example:
                            { "contents": "read", "pull_requests": "write" }
                        events:
                          type: array
                          items:
                            type: string
                          example: ["push", "pull_request"]
                        repository_selection:
                          type: string
                          enum: ["all", "selected"]
                          example: "selected"
                        all_repos_selected:
                          type: boolean
                          example: false
                        repository_count:
                          type: integer
                          example: 5
                        repositories:
                          type: array
                          items:
                            type: string
                          example: ["repo1", "repo2"]
                        installed_by:
                          type: string
                          example: "john-doe"
                        installation_date:
                          type: string
                          example: "2026-01-15T09:00:00Z"
                        is_suspended:
                          type: boolean
                          example: false
                  fine_grained_pats:
                    type: array
                    description: "List of fine-grained Personal Access Tokens"
                    items:
                      type: object
                      properties:
                        token_id:
                          type: integer
                          example: 456789
                        token_name:
                          type: string
                          example: "My Dev Token"
                        owner:
                          type: string
                          example: "jane-smith"
                        owner_id:
                          type: integer
                          example: 987654
                        permissions:
                          type: object
                          additionalProperties:
                            type: string
                          example: { "contents": "read", "metadata": "read" }
                        repository_selection:
                          type: string
                          enum: ["all", "subset", "none"]
                          example: "subset"
                        all_repos_selected:
                          type: boolean
                          example: false
                        repository_count:
                          type: integer
                          example: 3
                        repositories:
                          type: array
                          items:
                            type: string
                          example: ["repo1", "repo3"]
                        has_expired:
                          type: boolean
                          example: false
                        expires_at:
                          type: string
                          example: "2026-07-27T23:59:59Z"
                        last_used_at:
                          type: string
                          example: "2026-01-26T14:30:00Z"
                        created_at:
                          type: string
                          example: "2026-01-01T00:00:00Z"
                  classic_pats:
                    type: array
                    description: "List of classic Personal Access Tokens (requires SAML SSO)"
                    items:
                      type: object
                      properties:
                        credential_id:
                          type: integer
                          example: 845610786
                        credential_type:
                          type: string
                          example: "personal access token"
                        owner:
                          type: string
                          example: "bob-jones"
                        token_last_eight:
                          type: string
                          example: "fQ491wXt"
                        scopes:
                          type: array
                          items:
                            type: string
                          example: ["repo", "workflow", "admin:org"]
                        authorized_at:
                          type: string
                          example: "2026-01-23T00:52:26Z"
                        last_accessed_at:
                          type: string
                          example: "2025-08-26T05:08:49Z"
                        has_expired:
                          type: boolean
                          example: false
                        expires_at:
                          type: string
                          example: "2026-07-28T18:30:00Z"
                  github_apps_unique_permissions:
                    type: array
                    items:
                      type: string
                    description: "List of unique permissions across all GitHub Apps"
                    example: ["contents", "pull_requests", "issues"]
                  fine_grained_pats_unique_permissions:
                    type: array
                    items:
                      type: string
                    description: "List of unique permissions across all fine-grained PATs"
                    example: ["contents", "metadata", "actions"]
                  fine_grained_pats_unique_owners:
                    type: array
                    items:
                      type: string
                    description: "List of unique owner usernames for fine-grained PATs"
                    example: ["jane-smith", "john-doe"]
                  classic_pats_unique_scopes:
                    type: array
                    items:
                      type: string
                    description: "List of unique scopes across all classic PATs"
                    example: ["repo", "workflow", "admin:org"]
                  classic_pats_unique_owners:
                    type: array
                    items:
                      type: string
                    description: "List of unique owner usernames for classic PATs"
                    example: ["bob-jones", "alice-wong"]
                  classic_pats_available:
                    type: boolean
                    description: "Whether classic PATs data is available (requires SSO)"
                    example: true
                  pagination:
                    type: object
                    description: "Pagination metadata"
                    properties:
                      page:
                        type: integer
                        example: 1
                      page_size:
                        type: integer
                        example: 50
                      total_github_apps:
                        type: integer
                        example: 12
                      total_fine_grained_pats:
                        type: integer
                        example: 28
                      total_classic_pats:
                        type: integer
                        example: 15
                      total_pages_github_apps:
                        type: integer
                        example: 1
                      total_pages_fine_grained:
                        type: integer
                        example: 1
                      total_pages_classic:
                        type: integer
                        example: 1
        "400":
          description: "Bad Request - invalid parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "401":
          description: "Unauthorized - invalid or missing authentication token"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "500":
          description: "Internal Server Error - failed to fetch app posture data"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

