                        type: object
                        properties:
                          enabled:
                            type: boolean
                          type:
                            nullable: true
                            type: string
                            enum:
                            - required
                            - optional
                  repos:
                    description: Per-repository check settings, keyed by repository name
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        baseline:
                          description: Whether baseline check is enabled for this repository
                          type: boolean
                        run_required_checks:
                          description: Whether required checks are enabled for this repository
                          type: boolean
                        run_optional_checks:
                          description: Whether optional checks are enabled for this repository
                          type: boolean
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
    put:
