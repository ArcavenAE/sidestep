                    job: '*'
                    owner: '*'
                    repo: '*'
                    workflow: '*'
                  id: Source-Code-Overwritten
                  name: Source Code Overwritten rule 1
                  severity_action:
                    type: ignore
              source_code_overwritten_all_repos:
                summary: Source Code Overwritten Rule (all repos of an org)
                description: Suppress Source-Code-Overwritten detections for specific files
                value:
                  conditions:
                    file: cli.js.cache
                    file_path: src/cache/cli.js.cache
                    job: '*'
                    owner: org
                    repo: '*'
                    workflow: '*'
                  id: Source-Code-Overwritten
                  name: Source Code Overwritten rule 2
                  severity_action:
                    type: ignore
              source_code_overwritten_specific_workflow:
                summary: Source Code Overwritten Rule (specific workflow)
                description: Suppress Source-Code-Overwritten detections for specific files
                value:
                  conditions:
                    file: cli.js.cache
                    file_path: src/cache/cli.js.cache
                    job: '*'
                    owner: org
                    repo: admin-ui
                    workflow: build-and-test.yml
                  id: Source-Code-Overwritten
                  name: Source Code Overwritten rule 3
                  severity_action:
