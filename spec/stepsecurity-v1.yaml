          description: "Unauthorized"
        "500":
          description: "Internal Server Error"

    post:
      tags:
        - "Admin Console"
      summary: "Add organization member"
      description: "Add a new member to the customer/organization with specific access policies"
      security:
        - BearerAuth: []
      parameters:
        - name: customer
          in: path
          required: true
          description: "Customer organization identifier"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_names
                - auth_type
                - policies
              properties:
                user_names:
                  type: array
                  items:
                    type: string
                  description: "List of usernames to add"
                  example: ["temp-1"]
                auth_type:
                  type: string
                  enum: ["Github", "SSO"]
                  description: "Authentication method for the user"
                  example: "Github"
                email_suffixes:
                  type: array
                  items:
                    type: string
                  description: "Email suffixes restriction (optional). **WARNING**: When specified, this grants access to ALL GitHub users with the matching email suffix, not just the users listed in user_names."
                  example: "@company.com"
                policies:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - scope
                      - role
                    properties:
                      type:
                        type: string
                        enum: ["github"]
                        description: "Platform type"
                        example: "github"
                      scope:
                        type: string
                        enum: ["customer", "organization"]
                        description: "Access scope level"
                        example: "organization"
                      role:
                        type: string
                        enum: ["admin", "auditor"]
                        description: "Role permissions"
                        example: "admin"
                      organization:
                        type: string
                        description: "Organization name (required when scope is 'organization')"
                        example: "test-org"
                  description: "List of access policies for the user"
            examples:
              github_org_auditor:
                summary: "GitHub Organization Auditor"
                description: "Provides auditor access to a specific GitHub organization"
                value:
                  user_names: ["john-doe"]
                  auth_type: "Github"
                  policies:
                    - type: "github"
                      scope: "organization"
                      organization: "my-company"
                      role: "auditor"

              github_org_admin:
                summary: "GitHub Organization Admin"
                description: "Provides admin access to a specific GitHub organization"
                value:
                  user_names: ["jane-admin"]
                  auth_type: "Github"
                  policies:
                    - type: "github"
                      scope: "organization"
                      organization: "my-company"
                      role: "admin"

              github_customer_admin:
                summary: "GitHub Customer Admin"
                description: "Provides admin access across all GitHub organizations for the customer"
                value:
                  user_names: ["jane-admin"]
                  auth_type: "Github"
                  policies:
                    - type: "github"
                      scope: "customer"
                      role: "admin"

              github_org_admin_with_sso:
                summary: "Github Organization Admin With SSO"
                description: "Provides admin access to a specific GitHub organization"
                value:
                  emails: ["jane@org-admin.com"]
                  auth_type: "SSO"
                  policies:
                    - type: "github"
                      scope: "organization"
                      organization: "my-company"
                      role: "admin"

              email_suffix_access:
                summary: "Email Suffix-Based Access"
                description: "⚠️ **WARNING**: Grants access to ALL GitHub users with @company.com email addresses. Use with extreme caution as this can provide access to many users beyond those listed in user_names."
                value:
                  auth_type: "Github"
                  email_suffixes: ["@company.com"]
                  policies:
                    - type: "github"
                      scope: "organization"
                      organization: "my-company"
                      role: "auditor"

