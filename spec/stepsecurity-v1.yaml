                - workflow_id
                - detection
              properties:
                workflow_id:
                  type: string
                  description: "Workflow ID associated with the detection"
                  example: "8967030851"
                detection:
                  type: string
                  description: "Detection ID to update"
                  example: "step-security#agent#8967030851#21805486855#New-Outbound-Network-Call#api.github.com:443#2024-09-28T10:15:30Z"
                suppress:
                  type: boolean
                  description: "Set to true to suppress the detection, false to unsuppress"
                  example: true
                suppress_reason:
                  type: string
                  description: "Reason for suppressing the detection (optional)"
                  example: "Expected behavior for this workflow"
                resolve:
                  type: boolean
                  description: "Set to true to resolve the detection, false to unresolve"
                  example: false
                resolve_reason:
                  type: string
                  description: "Reason for resolving the detection (optional)"
                  example: "Issue has been fixed"
