openapi: 3.0.0
info:
  title: Step Security API
  description: API for interacting with Step Security's services. This API provides comprehensive GitHub Actions security monitoring, GitLab integration, and enterprise management capabilities.
  version: 1.0.0
servers:
- url: https://agent.api.stepsecurity.io/v1
  description: Production API Server
paths:
  /github/{owner}/actions/security-summary:
    get:
      tags:
      - Overview
      summary: Get security summary for your GitHub repositories
      description: Provides an overview of security metrics across all repositories in your organization
      operationId: getSecuritySummary
      parameters:
      - in: path
        name: owner
        description: GitHub Organization
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SecuritySummary'
        '401':
          description: Unauthorized. Invalid or missing token.
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
  /github/{owner}/{scope}/actions/controls/{control}:
    get:
      tags:
      - Overview
      summary: Get security control checks data
      description: Retrieve detailed security control checks data for all repositories in the organization for a specific control
      operationId: getControlChecksData
      parameters:
      - in: path
        name: owner
        description: GitHub Organization
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: scope
        description: Scope for the control checks - use '[all]' for all repositories or specific repository name
        required: true
        schema:
          type: string
        example: '[all]'
        style: simple
      - in: path
        name: control
        description: Security control ID
        required: true
        schema:
          type: string
          enum:
          - ActionsWithHighScoresShouldBeUsed
          - SecretsShouldBeRotatedPeriodically
          - EnvironmentSecretsShouldBeUsed
          - SelfHostedRunnerShouldBeHardened
          - GitHubHostedRunnerShouldBeHardened
          - ActionsShouldBePinned
          - OIDCShouldBeUsed
          - SecretsShouldNotBeLoggedInBuildLogs
          - SecretsShouldNotBeLoggedInArtifacts
          - CompromisedNPMPackagesFoundInPR
        example: GitHubHostedRunnerShouldBeHardened
        style: simple
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    owner:
                      description: GitHub organization owner
                      type: string
                    repoWorkflowJobControl:
                      description: Unique identifier for repo/workflow/job/control combination
                      type: string
                    ownerControl:
                      description: Unique identifier for owner/control combination
                      type: string
                    status:
                      description: Control check status
                      type: string
                      enum:
                      - Failed
                      - Passed
                      - Suppressed
                    repo:
                      description: Repository name
                      type: string
                    workflow:
                      description: Workflow file name
                      type: string
                    job:
                      description: Job name
                      type: string
                    step:
                      description: Step name
                      type: string
                    stepNumber:
                      description: Step number
                      type: number
                    lineNumber:
                      description: Line number in workflow file
                      type: number
                    pwnRefs:
                      description: Reference information
                      type: string
                    actions:
                      description: List of actions involved
                      type: array
                      items:
                        type: string
                    control:
                      description: Control identifier
                      type: string
                    secrets:
                      description: Secrets found in build logs
                      type: array
                      items:
                        type: object
                        properties:
                          secret:
                            type: string
                          line_number:
                            type: string
                          rule_id:
                            type: string
                          step_number:
                            type: string
                    secrets_in_artifacts:
                      description: Secrets found in artifacts
                      type: array
                      items:
                        type: object
                        properties:
                          artifact_name:
                            type: string
                          file_path:
                            type: string
                          line_number:
                            type: string
                          rule_id:
                            type: string
                          secret:
                            type: string
                    runId:
                      description: GitHub Actions run ID
                      type: string
                    branch:
                      description: Branch name
                      type: string
                    workflowHTMLURL:
                      description: URL to the workflow on GitHub
                      type: string
                    jobHTMLURL:
                      description: URL to the job on GitHub
                      type: string
                    statusUpdationReason:
                      description: Reason for status update (when suppressed/unsuppressed)
                      type: string
                    statusUpdatedBy:
                      description: User who updated the status
                      type: string
        '400':
          description: Bad Request - Invalid control ID
        '401':
          description: Unauthorized. Invalid or missing token.
        '404':
          description: Control not found
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
  /github/{owner}/actions/runs:
    get:
      tags:
      - Harden Runner
      summary: Get workflow runs with security data
      description: |
        List workflow runs across the organization with their runtime
        security summary, ordered by `start_time_utc` descending (latest
        first).

        Combine `limit` with `next_token` to walk through all matching runs
        a page at a time. Use `start_time` / `end_time` to scope the listing
        to a date range.

        ### Caller pattern for "all runs in [start, end]"

        ```
        token = ""
        loop:
          GET /github/{owner}/actions/runs?start_time=S&end_time=E&limit=100&next_token=<token>
          collect items
          token = response.next_token
          if !token: break
        ```

        Because the listing is in descending order, the caller can
        short-circuit once an item predates `start_time`.
      operationId: getRunsDetails
      parameters:
      - in: path
        name: owner
        description: GitHub Organization
        required: true
        schema:
          type: string
        style: simple
      - in: query
        name: limit
        description: Page size. Clamped to `[1, 100]` server-side.
        schema:
          default: 30
          type: integer
          minimum: 1
          maximum: 100
        style: form
      - in: query
        name: next_token
        description: |
          Opaque continuation cursor returned in the previous response's
          `next_token` field. Pass it back verbatim to fetch the next
          page. Only meaningful for the same `owner` and filter set —
          changing other query params between calls invalidates it. A
          malformed value yields `400`.
        schema:
          type: string
        style: form
      - in: query
        name: start_time
        description: |
          Lower bound on `workflow_run_created_at`, expressed as a Unix
          epoch in seconds (UTC). Must be non-negative, must not be in the
          future, and must not be more than **90 days** in the past —
          older windows are rejected with `400`.
        schema:
          example: 1704067200
          type: integer
          format: int64
        style: form
      - in: query
        name: end_time
        description: |
          Upper bound on `workflow_run_created_at`, expressed as a Unix
          epoch in seconds (UTC). Must be non-negative and `>= start_time`.
          When omitted, no upper bound is applied.
        schema:
          example: 1735689600
          type: integer
          format: int64
        style: form
      - in: query
        name: is_harden_runner_enabled
        description: When `true`, only return runs that had Harden-Runner enabled on at least one job.
        schema:
          type: boolean
        style: form
      - in: query
        name: detection_type
        description: |
          Limit the listing to runs that produced at least one detection
          of the given type. Values outside the enumerated set are
          rejected.
        schema:
          type: string
          enum:
          - Domain-Blocked
          - New-Outbound-Network-Call
          - Secret-In-Build-Log
          - Source-Code-Overwritten
          - HTTPS-Outbound-Network-Call
          - Action-Uses-Imposter-Commit
          - Suspicious-Network-Call
          - Suspicious-Process-Call
        style: form
      - in: query
        name: runner_name
        description: |
          Limit the listing to the run that includes a job executed on
          the given self-hosted runner. If the runner name has never
          been seen for this owner, the response body is JSON `null`
          with status `200`.
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_workflow_runs:
                    description: Advisory item count for the current page. Use `has_more` / `next_token` for pagination termination.
                    type: integer
                  workflow_runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkflowRun'
                  next_token:
                    description: Opaque continuation cursor. Pass back as the `next_token` query param to fetch the next page. Empty when the listing is fully drained.
                    type: string
                  has_more:
                    description: '`true` when more pages remain; equivalent to `next_token != ""`.'
                    type: boolean
        '400':
          description: |
            Bad request. Returned for: `start_time` older than 90 days,
            negative or future `start_time`, negative `end_time`,
            `end_time < start_time`, non-positive `limit`, or a malformed
            `next_token` (the body is the specific reason).
        '401':
          description: Unauthorized. Invalid or missing token.
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
  /github/{owner}/{repo}/actions/runs:
    get:
      tags:
      - Harden Runner
      summary: Get repository workflow runs
      description: |
        List workflow runs for a single repository with their runtime
        security summary, ordered by `start_time_utc` descending (latest
        first). Same pagination and time-range contract as the org-level
        `GET /github/{owner}/actions/runs` — see that endpoint for the
        caller pattern.
      operationId: getRepoRunsDetails
      parameters:
      - in: path
        name: owner
        description: GitHub Organization
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: repo
        description: Name of the repository
        required: true
        schema:
          type: string
        style: simple
      - in: query
        name: limit
        description: Page size. Clamped to `[1, 100]` server-side.
        schema:
          default: 30
          type: integer
          minimum: 1
          maximum: 100
        style: form
      - in: query
        name: next_token
        description: Opaque continuation cursor returned in the previous response's `next_token` field.
        schema:
          type: string
        style: form
      - in: query
        name: start_time
        description: Lower bound on `workflow_run_created_at` (Unix seconds, UTC). Capped at 90 days in the past.
        schema:
          type: integer
          format: int64
        style: form
      - in: query
        name: end_time
        description: Upper bound on `workflow_run_created_at` (Unix seconds, UTC). Must be `>= start_time`.
        schema:
          type: integer
          format: int64
        style: form
      - in: query
        name: is_harden_runner_enabled
        description: When `true`, only return runs that had Harden-Runner enabled on at least one job.
        schema:
          type: boolean
        style: form
      - in: query
        name: detection_type
        description: Limit the listing to runs that produced at least one detection of the given type. Values outside the enumerated set are rejected.
        schema:
          type: string
          enum:
          - Domain-Blocked
          - New-Outbound-Network-Call
          - Secret-In-Build-Log
          - Source-Code-Overwritten
          - HTTPS-Outbound-Network-Call
          - Action-Uses-Imposter-Commit
          - Suspicious-Network-Call
          - Suspicious-Process-Call
        style: form
      - in: query
        name: runner_name
        description: Limit the listing to the run that includes a job executed on the given self-hosted runner. If the name has never been seen, the body is JSON `null` with status `200`.
        schema:
          type: string
        style: form
      - in: query
        name: workflow_name
        description: 'Filter by workflow file basename — for `path: .github/workflows/ci.yml`, pass `ci.yml`. Repo-level only.'
        schema:
          example: ci.yml
          type: string
        style: form
      - in: query
        name: branch
        description: Filter by `head_branch`. Repo-level only.
        schema:
          type: string
        style: form
      - in: query
        name: pr_number
        description: Filter to runs associated with the given pull request number. Repo-level only.
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_workflow_runs:
                    description: Advisory item count for the current page. Use `has_more` / `next_token` for pagination termination.
                    type: integer
                  workflow_runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkflowRun'
                  next_token:
                    description: Opaque continuation cursor. Pass back as the `next_token` query param to fetch the next page. Empty when the listing is fully drained.
                    type: string
                  has_more:
                    description: '`true` when more pages remain; equivalent to `next_token != ""`.'
                    type: boolean
        '400':
          description: Bad request — see the org-level endpoint for the validation rules.
        '401':
          description: Unauthorized. Invalid or missing token.
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
  /github/{owner}/{repo}/actions/runs/{runid}:
    get:
      tags:
      - Harden Runner
      summary: Get workflow run insights
      description: Get detailed runtime security insights for a specific workflow run
      operationId: get_github_owner_repo_actions_runs_runid
      parameters:
      - in: path
        name: owner
        description: GitHub Organization
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: repo
        description: Name of the repository
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: runid
        description: The Run ID of the GitHub Actions run
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: Successfully retrieved run details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  repo:
                    type: string
                  owner:
                    type: string
                  visibility:
                    type: string
                  jobs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        run_id:
                          type: string
                        steps:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              status:
                                type: string
        '401':
          description: Unauthorized. Invalid or missing token.
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
  /github/{owner}/{repo}/actions/runs/{runid}/jobs/{jobid}/processevents:
    get:
      tags:
      - Harden Runner
      summary: Get process events for a job
      description: |
        Get raw process events captured by Harden-Runner for a specific job in a workflow run.

        The response body is a pre-signed Amazon S3 URL (returned as plain text, not JSON). Issue
        an unauthenticated `GET` against that URL within 5 minutes to download the
        `process_events.json` payload. The pre-signed URL must not be shared with `Authorization`
        headers — the URL itself carries the credentials.

        Typical workflow:
          1. Call `GET /github/{owner}/{repo}/actions/runs/{runid}` to discover the job IDs in the run.
          2. For each job, call this endpoint to obtain a pre-signed URL.
          3. `GET` the pre-signed URL to retrieve the process events JSON.
      operationId: get_github_owner_repo_actions_runs_runid_jobs_jobid_processevents
      parameters:
      - in: path
        name: owner
        description: GitHub organization or user that owns the repository
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: repo
        description: Name of the repository
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: runid
        description: The Run ID of the GitHub Actions run
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: jobid
        description: The Job ID within the workflow run (obtained from the workflow run insights `jobs[].id` field)
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: |
            Successfully generated a pre-signed URL. The body is the URL as plain text
            (no JSON wrapping). `GET` the URL (no `Authorization` header — credentials are
            embedded in the query string) to retrieve a JSON document with the shape:

            ```json
            {
              "type": "RawProcessEvents",
              "payload": {
                "<pid>": {
                  "pid": "string",
                  "ppid": "string",
                  "exe": "string",
                  "working_directory": "string",
                  "arguments": ["string"],
                  "timestamp": "string (RFC3339)"
                }
              },
              "ip_address": "string"
            }
            ```

            Each entry in `payload` is keyed by the process ID (string) and describes a
            single process that ran during the job. Example value:

            ```json
            {
              "pid": "2316",
              "ppid": "2315",
              "exe": "/usr/bin/docker",
              "working_directory": "/home/runner/work/my-repo/my-repo",
              "arguments": ["docker", "pull", "alpine:3.18"],
              "timestamp": "2026-04-25T08:45:12.144Z"
            }
            ```
          content:
            text/plain:
              schema:
                example: https://customer-raw-events-data-277233109775.s3.us-west-2.amazonaws.com/correlate_runs/my-org/my-repo/12345678-events/98765432/process_events.json?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Expires=300&X-Amz-Signature=...
                description: Pre-signed Amazon S3 URL to download `process_events.json`. Expires in 5 minutes.
                type: string
                format: uri
        '400':
          description: Bad Request - Missing or invalid `owner`, `repo`, `runid`, or `jobid`
        '401':
          description: Unauthorized. Invalid or missing token.
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
  /github/{owner}/{repo}/actions/runs/{runid}/jobs/{jobid}/fileevents:
    get:
      tags:
      - Harden Runner
      summary: Get file events for a job
      description: |
        Get raw file events captured by Harden-Runner for a specific job in a workflow run.

        The response body is a pre-signed Amazon S3 URL (returned as plain text, not JSON). Issue
        an unauthenticated `GET` against that URL within 5 minutes to download the
        `file_events.json` payload. The pre-signed URL must not be shared with `Authorization`
        headers — the URL itself carries the credentials.

        Typical workflow:
          1. Call `GET /github/{owner}/{repo}/actions/runs/{runid}` to discover the job IDs in the run.
          2. For each job, call this endpoint to obtain a pre-signed URL.
          3. `GET` the pre-signed URL to retrieve the file events JSON.
      operationId: get_github_owner_repo_actions_runs_runid_jobs_jobid_fileevents
      parameters:
      - in: path
        name: owner
        description: GitHub organization or user that owns the repository
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: repo
        description: Name of the repository
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: runid
        description: The Run ID of the GitHub Actions run
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: jobid
        description: The Job ID within the workflow run (obtained from the workflow run insights `jobs[].id` field)
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: |
            Successfully generated a pre-signed URL. The body is the URL as plain text
            (no JSON wrapping). `GET` the URL (no `Authorization` header — credentials are
            embedded in the query string) to retrieve a JSON document with the shape:

            ```json
            {
              "type": "RawFileEvents",
              "payload": {
                "<absolute_file_path>": [
                  {
                    "exe": "string",
                    "pid": "string",
                    "ppid": "string",
                    "timestamp": "string (RFC3339)"
                  }
                ]
              },
              "ip_address": "string"
            }
            ```

            Each entry in `payload` is keyed by an absolute file path that was written
            during the job, and the value is the list of writes against that path. Example:

            ```json
            {
              "/home/runner/work/my-repo/my-repo/.git/index.lock": [
                {
                  "exe": "/usr/bin/git",
                  "pid": "2342",
                  "ppid": "2232",
                  "timestamp": "2026-04-25T07:17:49.818Z"
                }
              ]
            }
            ```
          content:
            text/plain:
              schema:
                example: https://customer-raw-events-data-277233109775.s3.us-west-2.amazonaws.com/correlate_runs/my-org/my-repo/12345678-events/98765432/file_events.json?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Expires=300&X-Amz-Signature=...
                description: Pre-signed Amazon S3 URL to download `file_events.json`. Expires in 5 minutes.
                type: string
                format: uri
        '400':
          description: Bad Request - Missing or invalid `owner`, `repo`, `runid`, or `jobid`
        '401':
          description: Unauthorized. Invalid or missing token.
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
  /github/{owner}/actions/detections:
    get:
      tags:
      - Harden Runner
      summary: Get runtime security detections
      description: Get runtime security detections for the Organization
      operationId: get_github_owner_actions_detections
      parameters:
      - in: path
        name: owner
        description: GitHub organization or user that owns the repository
        required: true
        schema:
          type: string
        style: simple
      - in: query
        name: detection_id
        description: ID of the detection
        required: true
        schema:
          type: string
          enum:
          - Domain-Blocked
          - Source-Code-Overwritten
          - New-Outbound-Network-Call
          - HTTPS-Outbound-Network-Call
          - Secret-In-Build-Log
          - Secret-In-Artifact
          - Harden-Runner-Config-Changed
          - Action-Uses-Imposter-Commit
          - Action-Uses-Commit-From-Non-Default-Branch
          - Privileged-Container
          - Reverse-Shell
          - Suspicious-Network-Call
          - Suspicious-Process-Call
          - Runner-Worker-Memory-Read
          - NPM-Package-Upgrade-To-Suspicious-Version
        example: New-Outbound-Network-Call
        style: form
      - in: query
        name: status
        description: Status of the detection
        required: true
        schema:
          type: string
          enum:
          - new
          - suppressed
          - resolved
        example: new
        style: form
      - in: query
        name: next_token
        description: Token to fetch the next set of detections (for pagination)
        schema:
          default: ''
          type: string
        style: form
      - in: query
        name: limit
        description: Number of results per page
        schema:
          default: 50
          type: integer
          minimum: 1
          maximum: 1000
        example: 100
        style: form
      responses:
        '200':
          description: Successfully retrieved detections
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      detections:
                        nullable: true
                        description: Array of detection objects
                        type: array
                        items:
                          $ref: '#/components/schemas/Detection'
                      has_more:
                        example: false
                        description: Indicates if there are more results available
                        type: boolean
                      next_token:
                        example: ''
                        description: Token to fetch the next page of results
                        type: string
                      count:
                        example: 0
                        description: Total count of detections returned
                        type: integer
              examples:
                empty_response:
                  summary: No detections found
                  value:
                    data:
                      count: 0
                      detections: null
                      has_more: false
                      next_token: ''
                detections_response:
                  summary: Detections with data
                  value:
                    data:
                      count: 1
                      detections:
                      - customer_id_status: new
                        detection: New-Outbound-Network-Call
                        endpoint: api.github.com:443
                        event_id: 21805486855-curl-api.github.com:443-2024-09-28T10:15:30Z
                        expected_outbound_connections: []
                        id: step-security#agent#8967030851#21805486855#New-Outbound-Network-Call#api.github.com:443#2024-09-28T10:15:30Z
                        id_timestamp: step-security#agent#8967030851#21805486855#New-Outbound-Network-Call#api.github.com:443#2024-09-28T10:15:30Z#1727519730
                        is_resolved: false
                        is_suppressed: false
                        job: build-and-test
                        job_id: '30724290278'
                        name: New-Outbound-Network-Call
                        owner: step-security
                        owner_id_status: new
                        owner_repo: step-security/agent
                        owner_repo_id_status: new
                        repo: agent
                        run_attempt: 1
                        run_id: '11045105932'
                        timestamp: 2024-09-28T10:15:30Z
                        tool:
                          name: curl
                          parent: sh
                          sha256: 39c6f0c152cd525a089c6e55c91b0c1e7fb5c25a21d12ade61e85f15417178ad
                        type: New-Outbound-Network-Call
                        workflow_id: '8967030851'
                        workflow_path: .github/workflows/build-and-test.yml
                      has_more: false
                      next_token: ''
        '400':
          description: Bad Request - Invalid detection status or ID or next token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    example: invalid detection status or ID or next token
                    type: string
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
    post:
      tags:
      - Harden Runner
      summary: Suppress or resolve runtime security detections
      description: Update detection status by suppressing or resolving runtime security detections for the organization
      operationId: post_github_owner_actions_detections
      parameters:
      - in: path
        name: owner
        description: GitHub organization or user that owns the repository
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                workflow_id:
                  example: '8967030851'
                  description: Workflow ID associated with the detection
                  type: string
                detection:
                  example: step-security#agent#8967030851#21805486855#New-Outbound-Network-Call#api.github.com:443#2024-09-28T10:15:30Z
                  description: Detection ID to update
                  type: string
                suppress:
                  example: true
                  description: Set to true to suppress the detection, false to unsuppress
                  type: boolean
                suppress_reason:
                  example: Expected behavior for this workflow
                  description: Reason for suppressing the detection (optional)
                  type: string
                resolve:
                  example: false
                  description: Set to true to resolve the detection, false to unresolve
                  type: boolean
                resolve_reason:
                  example: Issue has been fixed
                  description: Reason for resolving the detection (optional)
                  type: string
              required:
              - workflow_id
              - detection
            examples:
              suppress_detection:
                summary: Suppress a detection
                description: Mark a detection as suppressed with a reason
                value:
                  detection: <detection>
                  suppress: true
                  suppress_reason: This is an expected network call for our CI/CD pipeline
                  workflow_id: <workflow_id>
              resolve_detection:
                summary: Resolve a detection
                description: Mark a detection as resolved with a reason
                value:
                  detection: <detection>
                  resolve: true
                  resolve_reason: Secret has been rotated and removed from logs
                  workflow_id: <workflow_id>
              unsuppress_detection:
                summary: Unsuppress a detection
                description: Remove suppression from a previously suppressed detection
                value:
                  detection: <detection>
                  suppress: false
                  workflow_id: <workflow_id>
              unresolve_detection:
                summary: Unresolve a detection
                description: Remove resolution from a previously resolved detection
                value:
                  detection: <detection>
                  resolve: false
                  workflow_id: <workflow_id>
        required: true
      responses:
        '200':
          description: Detection status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    example: Detection status updated successfully
                    type: string
        '400':
          description: Bad Request - Invalid request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    example: invalid body
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    example: unauthorized
                    type: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    example: failed to update detection suppression
                    type: string
      security:
      - BearerAuth: []
