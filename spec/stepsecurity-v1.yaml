paths:
  # Overview Section
  /github/{owner}/actions/security-summary:
    get:
      tags:
        - "Overview"
      summary: "Get security summary for your GitHub repositories"
      description: "Provides an overview of security metrics across all repositories in your organization"
      operationId: "getSecuritySummary"
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          description: "GitHub Organization"
          schema:
            type: string
      responses:
        "200":
          description: "Successful operation"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecuritySummary"
        "401":
          description: "Unauthorized. Invalid or missing token."
        "500":
          description: "Internal Server Error"

  /github/{owner}/{scope}/actions/controls/{control}:
    get:
      tags:
        - "Overview"
      summary: "Get security control checks data"
      description: "Retrieve detailed security control checks data for all repositories in the organization for a specific control"
      operationId: "getControlChecksData"
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          description: "GitHub Organization"
          schema:
            type: string
        - name: scope
          in: path
          required: true
          description: "Scope for the control checks - use '[all]' for all repositories or specific repository name"
          schema:
            type: string
          example: "[all]"
        - name: control
          in: path
          required: true
          description: "Security control ID"
          schema:
            type: string
            enum:
              - "ActionsWithHighScoresShouldBeUsed"
              - "SecretsShouldBeRotatedPeriodically"
              - "EnvironmentSecretsShouldBeUsed"
              - "SelfHostedRunnerShouldBeHardened"
              - "GitHubHostedRunnerShouldBeHardened"
              - "ActionsShouldBePinned"
              - "OIDCShouldBeUsed"
              - "SecretsShouldNotBeLoggedInBuildLogs"
              - "SecretsShouldNotBeLoggedInArtifacts"
              - "CompromisedNPMPackagesFoundInPR"
          example: "GitHubHostedRunnerShouldBeHardened"
      responses:
        "200":
          description: "Successful operation"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    owner:
                      type: string
                      description: "GitHub organization owner"
                    repoWorkflowJobControl:
                      type: string
                      description: "Unique identifier for repo/workflow/job/control combination"
                    ownerControl:
                      type: string
                      description: "Unique identifier for owner/control combination"
                    status:
                      type: string
                      enum: ["Failed", "Passed", "Suppressed"]
                      description: "Control check status"
                    repo:
                      type: string
                      description: "Repository name"
                    workflow:
                      type: string
                      description: "Workflow file name"
                    job:
                      type: string
                      description: "Job name"
                    step:
                      type: string
                      description: "Step name"
                    stepNumber:
                      type: number
                      description: "Step number"
                    lineNumber:
                      type: number
                      description: "Line number in workflow file"
                    pwnRefs:
                      type: string
                      description: "Reference information"
                    actions:
                      type: array
                      items:
                        type: string
                      description: "List of actions involved"
                    control:
                      type: string
                      description: "Control identifier"
                    secrets:
                      type: array
                      items:
                        type: object
                        properties:
                          secret:
                            type: string
                          line_number:
                            type: string
                          rule_id:
                            type: string
                          step_number:
                            type: string
                      description: "Secrets found in build logs"
                    secrets_in_artifacts:
                      type: array
                      items:
                        type: object
                        properties:
                          artifact_name:
                            type: string
                          file_path:
                            type: string
                          line_number:
                            type: string
                          rule_id:
                            type: string
                          secret:
                            type: string
                      description: "Secrets found in artifacts"
                    runId:
                      type: string
                      description: "GitHub Actions run ID"
                    branch:
                      type: string
                      description: "Branch name"
                    workflowHTMLURL:
                      type: string
                      description: "URL to the workflow on GitHub"
                    jobHTMLURL:
                      type: string
                      description: "URL to the job on GitHub"
                    statusUpdationReason:
                      type: string
                      description: "Reason for status update (when suppressed/unsuppressed)"
                    statusUpdatedBy:
                      type: string
                      description: "User who updated the status"
        "400":
          description: "Bad Request - Invalid control ID"
        "401":
          description: "Unauthorized. Invalid or missing token."
        "404":
          description: "Control not found"
        "500":
          description: "Internal Server Error"

  # Harden Runner Section
  /github/{owner}/actions/runs:
    get:
      tags:
        - "Harden Runner"
      summary: "Get workflow runs with security data"
      description: |
        List workflow runs across the organization with their runtime
        security summary, ordered by `start_time_utc` descending (latest
        first).

        Combine `limit` with `next_token` to walk through all matching runs
        a page at a time. Use `start_time` / `end_time` to scope the listing
        to a date range.

        ### Caller pattern for "all runs in [start, end]"

        ```
        token = ""
        loop:
          GET /github/{owner}/actions/runs?start_time=S&end_time=E&limit=100&next_token=<token>
          collect items
          token = response.next_token
          if !token: break
        ```

        Because the listing is in descending order, the caller can
        short-circuit once an item predates `start_time`.
      operationId: "getRunsDetails"
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          description: "GitHub Organization"
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: "Page size. Clamped to `[1, 100]` server-side."
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 100
        - name: next_token
          in: query
          required: false
          description: |
            Opaque continuation cursor returned in the previous response's
            `next_token` field. Pass it back verbatim to fetch the next
            page. Only meaningful for the same `owner` and filter set —
            changing other query params between calls invalidates it. A
            malformed value yields `400`.
          schema:
            type: string
        - name: start_time
          in: query
          required: false
          description: |
            Lower bound on `workflow_run_created_at`, expressed as a Unix
            epoch in seconds (UTC). Must be non-negative, must not be in the
            future, and must not be more than **90 days** in the past —
            older windows are rejected with `400`.
          schema:
            type: integer
            format: int64
            example: 1704067200
        - name: end_time
          in: query
          required: false
          description: |
            Upper bound on `workflow_run_created_at`, expressed as a Unix
            epoch in seconds (UTC). Must be non-negative and `>= start_time`.
            When omitted, no upper bound is applied.
          schema:
            type: integer
            format: int64
            example: 1735689600
        - name: is_harden_runner_enabled
          in: query
          required: false
          description: "When `true`, only return runs that had Harden-Runner enabled on at least one job."
          schema:
            type: boolean
        - name: detection_type
          in: query
          required: false
          description: |
            Limit the listing to runs that produced at least one detection
            of the given type. Values outside the enumerated set are
            rejected.
          schema:
            type: string
            enum:
              - "Domain-Blocked"
              - "New-Outbound-Network-Call"
              - "Secret-In-Build-Log"
              - "Source-Code-Overwritten"
              - "HTTPS-Outbound-Network-Call"
              - "Action-Uses-Imposter-Commit"
              - "Suspicious-Network-Call"
              - "Suspicious-Process-Call"
        - name: runner_name
          in: query
          required: false
          description: |
            Limit the listing to the run that includes a job executed on
            the given self-hosted runner. If the runner name has never
            been seen for this owner, the response body is JSON `null`
            with status `200`.
          schema:
            type: string
      responses:
        "200":
          description: "Successful operation"
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_workflow_runs:
                    type: integer
                    description: "Advisory item count for the current page. Use `has_more` / `next_token` for pagination termination."
                  workflow_runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkflowRun"
                  next_token:
                    type: string
                    description: "Opaque continuation cursor. Pass back as the `next_token` query param to fetch the next page. Empty when the listing is fully drained."
                  has_more:
                    type: boolean
                    description: '`true` when more pages remain; equivalent to `next_token != ""`.'
        "400":
          description: |
            Bad request. Returned for: `start_time` older than 90 days,
            negative or future `start_time`, negative `end_time`,
            `end_time < start_time`, non-positive `limit`, or a malformed
            `next_token` (the body is the specific reason).
        "401":
          description: "Unauthorized. Invalid or missing token."
        "500":
          description: "Internal Server Error"

  /github/{owner}/{repo}/actions/runs:
    get:
      tags:
        - "Harden Runner"
      summary: "Get repository workflow runs"
      description: |
        List workflow runs for a single repository with their runtime
        security summary, ordered by `start_time_utc` descending (latest
        first). Same pagination and time-range contract as the org-level
        `GET /github/{owner}/actions/runs` — see that endpoint for the
        caller pattern.
      operationId: "getRepoRunsDetails"
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          description: "GitHub Organization"
          schema:
            type: string
        - name: repo
          in: path
          required: true
          description: "Name of the repository"
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: "Page size. Clamped to `[1, 100]` server-side."
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 100
        - name: next_token
          in: query
          required: false
          description: "Opaque continuation cursor returned in the previous response's `next_token` field."
          schema:
            type: string
        - name: start_time
          in: query
          required: false
          description: "Lower bound on `workflow_run_created_at` (Unix seconds, UTC). Capped at 90 days in the past."
          schema:
            type: integer
            format: int64
        - name: end_time
          in: query
          required: false
          description: "Upper bound on `workflow_run_created_at` (Unix seconds, UTC). Must be `>= start_time`."
          schema:
            type: integer
            format: int64
        - name: is_harden_runner_enabled
          in: query
          required: false
          description: "When `true`, only return runs that had Harden-Runner enabled on at least one job."
          schema:
            type: boolean
        - name: detection_type
          in: query
          required: false
          description: "Limit the listing to runs that produced at least one detection of the given type. Values outside the enumerated set are rejected."
          schema:
            type: string
            enum:
              - "Domain-Blocked"
              - "New-Outbound-Network-Call"
              - "Secret-In-Build-Log"
              - "Source-Code-Overwritten"
              - "HTTPS-Outbound-Network-Call"
              - "Action-Uses-Imposter-Commit"
              - "Suspicious-Network-Call"
              - "Suspicious-Process-Call"
        - name: runner_name
          in: query
          required: false
          description: "Limit the listing to the run that includes a job executed on the given self-hosted runner. If the name has never been seen, the body is JSON `null` with status `200`."
          schema:
            type: string
        - name: workflow_name
          in: query
          required: false
          description: "Filter by workflow file basename — for `path: .github/workflows/ci.yml`, pass `ci.yml`. Repo-level only."
          schema:
            type: string
            example: "ci.yml"
        - name: branch
          in: query
          required: false
          description: "Filter by `head_branch`. Repo-level only."
          schema:
            type: string
        - name: pr_number
          in: query
          required: false
          description: "Filter to runs associated with the given pull request number. Repo-level only."
          schema:
            type: string
      responses:
        "200":
          description: "Successful operation"
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_workflow_runs:
                    type: integer
                    description: "Advisory item count for the current page. Use `has_more` / `next_token` for pagination termination."
                  workflow_runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkflowRun"
                  next_token:
                    type: string
                    description: "Opaque continuation cursor. Pass back as the `next_token` query param to fetch the next page. Empty when the listing is fully drained."
                  has_more:
                    type: boolean
                    description: '`true` when more pages remain; equivalent to `next_token != ""`.'
        "400":
          description: "Bad request — see the org-level endpoint for the validation rules."
        "401":
          description: "Unauthorized. Invalid or missing token."
        "500":
          description: "Internal Server Error"

  /github/{owner}/{repo}/actions/runs/{runid}:
    get:
      tags:
        - "Harden Runner"
      summary: "Get workflow run insights"
      description: "Get detailed runtime security insights for a specific workflow run"
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: owner
          required: true
          description: "GitHub Organization"
          schema:
            type: string
        - in: path
          name: repo
          required: true
          description: "Name of the repository"
          schema:
            type: string
        - in: path
          name: runid
          required: true
          description: "The Run ID of the GitHub Actions run"
          schema:
            type: string
      responses:
        "200":
          description: "Successfully retrieved run details"
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  repo:
                    type: string
                  owner:
                    type: string
                  visibility:
                    type: string
                  jobs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        run_id:
                          type: string
                        steps:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              status:
                                type: string
        "401":
          description: "Unauthorized. Invalid or missing token."
        "500":
          description: "Internal Server Error"

  /github/{owner}/{repo}/actions/runs/{runid}/jobs/{jobid}/processevents:
    get:
      tags:
        - "Harden Runner"
      summary: "Get process events for a job"
      description: |
        Get raw process events captured by Harden-Runner for a specific job in a workflow run.

        The response body is a pre-signed Amazon S3 URL (returned as plain text, not JSON). Issue
        an unauthenticated `GET` against that URL within 5 minutes to download the
        `process_events.json` payload. The pre-signed URL must not be shared with `Authorization`
        headers — the URL itself carries the credentials.

        Typical workflow:
          1. Call `GET /github/{owner}/{repo}/actions/runs/{runid}` to discover the job IDs in the run.
          2. For each job, call this endpoint to obtain a pre-signed URL.
          3. `GET` the pre-signed URL to retrieve the process events JSON.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: owner
          required: true
          description: "GitHub organization or user that owns the repository"
          schema:
            type: string
        - in: path
          name: repo
          required: true
          description: "Name of the repository"
          schema:
            type: string
        - in: path
          name: runid
          required: true
          description: "The Run ID of the GitHub Actions run"
          schema:
            type: string
        - in: path
          name: jobid
          required: true
          description: "The Job ID within the workflow run (obtained from the workflow run insights `jobs[].id` field)"
          schema:
            type: string
      responses:
        "200":
          description: |
            Successfully generated a pre-signed URL. The body is the URL as plain text
            (no JSON wrapping). `GET` the URL (no `Authorization` header — credentials are
            embedded in the query string) to retrieve a JSON document with the shape:

            ```json
            {
              "type": "RawProcessEvents",
              "payload": {
                "<pid>": {
                  "pid": "string",
                  "ppid": "string",
                  "exe": "string",
                  "working_directory": "string",
                  "arguments": ["string"],
                  "timestamp": "string (RFC3339)"
                }
              },
              "ip_address": "string"
            }
            ```

            Each entry in `payload` is keyed by the process ID (string) and describes a
            single process that ran during the job. Example value:

            ```json
            {
              "pid": "2316",
              "ppid": "2315",
              "exe": "/usr/bin/docker",
              "working_directory": "/home/runner/work/my-repo/my-repo",
              "arguments": ["docker", "pull", "alpine:3.18"],
              "timestamp": "2026-04-25T08:45:12.144Z"
            }
            ```
          content:
            text/plain:
              schema:
                type: string
                format: uri
                description: "Pre-signed Amazon S3 URL to download `process_events.json`. Expires in 5 minutes."
                example: "https://customer-raw-events-data-277233109775.s3.us-west-2.amazonaws.com/correlate_runs/my-org/my-repo/12345678-events/98765432/process_events.json?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Expires=300&X-Amz-Signature=..."
        "400":
          description: "Bad Request - Missing or invalid `owner`, `repo`, `runid`, or `jobid`"
        "401":
          description: "Unauthorized. Invalid or missing token."
        "500":
          description: "Internal Server Error"

  /github/{owner}/{repo}/actions/runs/{runid}/jobs/{jobid}/fileevents:
    get:
      tags:
        - "Harden Runner"
      summary: "Get file events for a job"
      description: |
        Get raw file events captured by Harden-Runner for a specific job in a workflow run.

        The response body is a pre-signed Amazon S3 URL (returned as plain text, not JSON). Issue
        an unauthenticated `GET` against that URL within 5 minutes to download the
        `file_events.json` payload. The pre-signed URL must not be shared with `Authorization`
        headers — the URL itself carries the credentials.

        Typical workflow:
          1. Call `GET /github/{owner}/{repo}/actions/runs/{runid}` to discover the job IDs in the run.
          2. For each job, call this endpoint to obtain a pre-signed URL.
          3. `GET` the pre-signed URL to retrieve the file events JSON.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: owner
          required: true
          description: "GitHub organization or user that owns the repository"
          schema:
            type: string
        - in: path
          name: repo
          required: true
          description: "Name of the repository"
          schema:
            type: string
        - in: path
          name: runid
          required: true
          description: "The Run ID of the GitHub Actions run"
          schema:
            type: string
        - in: path
          name: jobid
          required: true
          description: "The Job ID within the workflow run (obtained from the workflow run insights `jobs[].id` field)"
          schema:
            type: string
      responses:
        "200":
          description: |
            Successfully generated a pre-signed URL. The body is the URL as plain text
            (no JSON wrapping). `GET` the URL (no `Authorization` header — credentials are
            embedded in the query string) to retrieve a JSON document with the shape:

            ```json
            {
              "type": "RawFileEvents",
              "payload": {
                "<absolute_file_path>": [
                  {
                    "exe": "string",
                    "pid": "string",
                    "ppid": "string",
                    "timestamp": "string (RFC3339)"
                  }
                ]
              },
              "ip_address": "string"
            }
            ```

            Each entry in `payload` is keyed by an absolute file path that was written
            during the job, and the value is the list of writes against that path. Example:

            ```json
            {
              "/home/runner/work/my-repo/my-repo/.git/index.lock": [
                {
                  "exe": "/usr/bin/git",
                  "pid": "2342",
                  "ppid": "2232",
                  "timestamp": "2026-04-25T07:17:49.818Z"
                }
              ]
            }
            ```
          content:
            text/plain:
              schema:
                type: string
                format: uri
                description: "Pre-signed Amazon S3 URL to download `file_events.json`. Expires in 5 minutes."
                example: "https://customer-raw-events-data-277233109775.s3.us-west-2.amazonaws.com/correlate_runs/my-org/my-repo/12345678-events/98765432/file_events.json?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Expires=300&X-Amz-Signature=..."
        "400":
          description: "Bad Request - Missing or invalid `owner`, `repo`, `runid`, or `jobid`"
        "401":
          description: "Unauthorized. Invalid or missing token."
        "500":
          description: "Internal Server Error"

  /github/{owner}/actions/detections:
    get:
      tags:
        - "Harden Runner"
      summary: "Get runtime security detections"
      description: "Get runtime security detections for the Organization"
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: owner
          required: true
          description: "GitHub organization or user that owns the repository"
          schema:
            type: string
        - in: query
          name: detection_id
          required: true
          description: "ID of the detection"
          schema:
            type: string
            enum:
              - "Domain-Blocked"
              - "Source-Code-Overwritten"
              - "New-Outbound-Network-Call"
              - "HTTPS-Outbound-Network-Call"
              - "Secret-In-Build-Log"
              - "Secret-In-Artifact"
              - "Harden-Runner-Config-Changed"
              - "Action-Uses-Imposter-Commit"
              - "Action-Uses-Commit-From-Non-Default-Branch"
              - "Privileged-Container"
              - "Reverse-Shell"
              - "Suspicious-Network-Call"
              - "Suspicious-Process-Call"
              - "Runner-Worker-Memory-Read"
