              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "All user(s) added successfully"
                  users_added:
                    type: array
                    items:
                      type: string
                    example: ["user1", "user2"]
                  total_added:
                    type: integer
                    example: 2
        "207":
          description: "Multi-status - Some members added successfully, others failed"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Partial success: some users added, others failed"
                  users_added:
                    type: array
                    items:
                      type: string
                    example: ["user1"]
                  users_failed:
                    type: array
                    items:
                      type: object
                      properties:
                        username:
                          type: string
                        error:
                          type: string
                    example:
                      - username: "user2"
                        error: "User already exists"
                  total_added:
                    type: integer
                    example: 1
                  total_failed:
                    type: integer
                    example: 1
        "400":
          description: "Bad request - invalid payload or missing required fields"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "401":
          description: "Unauthorized - invalid or missing authentication token"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "403":
          description: "Forbidden - insufficient permissions to add users with specified roles/scopes"
          content:
            application/json:
              schema:
