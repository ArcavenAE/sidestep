                  workflow_id: "<workflow_id>"
                  detection: "<detection>"
                  suppress: true
                  suppress_reason: "This is an expected network call for our CI/CD pipeline"
              resolve_detection:
                summary: "Resolve a detection"
                description: "Mark a detection as resolved with a reason"
                value:
                  workflow_id: "<workflow_id>"
                  detection: "<detection>"
                  resolve: true
                  resolve_reason: "Secret has been rotated and removed from logs"
              unsuppress_detection:
                summary: "Unsuppress a detection"
                description: "Remove suppression from a previously suppressed detection"
                value:
                  workflow_id: "<workflow_id>"
                  detection: "<detection>"
                  suppress: false
              unresolve_detection:
                summary: "Unresolve a detection"
                description: "Remove resolution from a previously resolved detection"
                value:
                  workflow_id: "<workflow_id>"
                  detection: "<detection>"
                  resolve: false
