          schema:
            type: string
          example: "myorg"
        - in: path
          name: policy_name
          required: true
          description: "Name of the policy to detach"
          schema:
            type: string
          example: "my-policy"
      responses:
        "200":
          description: "Policy detached successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Policy detached successfully"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "404":
          description: "Policy not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "500":
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

