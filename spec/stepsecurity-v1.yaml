  /github/{owner}/{repo}/checks/{head_sha}:
    get:
      tags:
        - "GitHub Checks"
      summary: "Get all checks for a specific commit"
      description: "Retrieve all StepSecurity checks for a specific commit SHA, including check run details, anomalous endpoints, and individual check results."
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          description: "GitHub Organization"
          schema:
            type: string
        - name: repo
          in: path
          required: true
          description: "GitHub Repository name"
          schema:
            type: string
        - name: head_sha
          in: path
          required: true
          description: "Git commit SHA"
          schema:
            type: string
      responses:
        "200":
          description: "Successfully retrieved checks for the commit"
          content:
            application/json:
              schema:
                type: object
                properties:
                  checks:
                    type: array
                    items:
                      type: object
                      properties:
                        owner:
                          type: string
                        repo:
                          type: string
                        pr_number:
                          type: integer
                        head_sha:
                          type: string
                        pr_title:
                          type: string
                        pr_user:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        check_runs:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                format: int64
                                description: "GitHub check run ID"
                              check_name:
                                type: string
                                description: "e.g., 'StepSecurity Harden-Runner' or 'StepSecurity Required/Optional Checks'"
                              check_type:
                                type: string
                                description: "e.g., 'harden-runner baseline' or 'required'"
                              created_at:
                                type: string
                                format: date-time
                              baseline_check:
                                type: array
                                nullable: true
                                description: "Present for harden-runner baseline checks — contains anomalous and blocked endpoints"
                                items:
                                  type: object
                                  properties:
                                    check_id:
                                      type: integer
                                      format: int64
                                    anomalous_endpoints:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          workflow:
                                            type: string
                                          workflow_url:
                                            type: string
                                          job_id:
                                            type: string
                                          run_id:
                                            type: string
                                          endpoint:
                                            type: string
                                          is_approved:
                                            type: boolean
                                          approved_by:
                                            type: string
                                          description:
                                            type: string
                                            description: "Approval comment"
                                    blocked_endpoints:
                                      type: array
                                      nullable: true
                                      items:
                                        type: object
                              conclusion:
                                type: string
                              status:
                                type: string
                              individual_check_results:
                                type: array
                                description: "Present for required checks — results of each sub-check"
                                items:
                                  type: object
                                  properties:
                                    check_name:
                                      type: string
                                    state:
                                      type: string
                                    success:
                                      type: boolean
                                    error:
                                      type: string
                              check_error:
                                type: string
                        stats:
                          type: object
                          properties:
                            total_checks:
                              type: integer
                            success:
                              type: integer
                            failure:
                              type: integer
                            in_progress:
                              type: integer
                            queued:
                              type: integer
                        approved:
                          type: boolean
                        approved_by:
                          type: string
                        cancelled:
                          type: boolean
                        cancelled_by:
                          type: string
                        conclusion:
                          type: string
        "401":
          description: "Unauthorized"
        "500":
          description: "Internal Server Error"

    post:
      tags:
        - "GitHub Checks"
      summary: "Approve or cancel all checks for a commit"
      description: >
        Approve or cancel all StepSecurity check runs for a specific commit SHA.
        This is the primary endpoint used by the dashboard to approve checks of any type
        (Harden-Runner baseline checks, Required/Optional Checks, etc.).
        For baseline checks with anomalous endpoints, approval automatically marks all
        anomalous endpoints as approved and updates the GitHub check run.
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          description: "GitHub Organization"
          schema:
            type: string
        - name: repo
          in: path
          required: true
          description: "GitHub Repository name"
          schema:
            type: string
        - name: head_sha
          in: path
          required: true
          description: "Git commit SHA"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                approved:
                  type: boolean
                  description: "Set to `true` to approve all checks for this commit"
                cancelled:
                  type: boolean
                  description: "Set to `true` to cancel all checks for this commit"
                endpoint_approval_comment:
                  type: object
                  description: "Optional map of endpoint (host:port) to approval comment. Only applicable when `approved` is `true`, anomalous endpoints were detected, and the baseline check has failed."
                  additionalProperties:
                    type: string
                  example:
                    "github.com:443": "expected"
                    "url.com:443": "added from tests"
            examples:
              approve:
                summary: "Approve all checks"
                value:
                  approved: true
              approve_with_comments:
                summary: "Approve checks with per-endpoint comments (when anomalous endpoints detected and baseline check failed)"
                value:
                  approved: true
                  endpoint_approval_comment:
                    "github.com:443": "expected"
                    "url.com:443": "added from tests"
              cancel:
                summary: "Cancel all checks"
                value:
                  cancelled: true
      responses:
        "200":
          description: "Checks updated successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Check runs updated successfully"
        "400":
          description: "Bad request — both approved and cancelled cannot be true"
        "401":
          description: "Unauthorized"
        "500":
          description: "Internal Server Error"

