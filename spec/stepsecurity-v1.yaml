        content:
          application/json:
            schema:
              type: object
              properties:
                customer:
                  description: Customer name (must match the path parameter)
                  type: string
                packages:
                  description: Optional specific packages and versions to search for
                  type: array
                  items:
                    $ref: '#/components/schemas/PypiPackageFilter'
                start_time:
                  description: Unix timestamp for search start time
                  type: integer
                end_time:
                  description: Unix timestamp for search end time
                  type: integer
                seen_only_in_prs:
                  description: Filter to packages seen only in pull requests
                  type: boolean
                seen_only_in_default_branch:
                  description: Filter to packages seen only on the default branch
                  type: boolean
