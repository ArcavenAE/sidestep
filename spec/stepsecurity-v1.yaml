                      npm_package_compromised_updates:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                          type:
                            nullable: true
                            type: string
                            enum:
                            - required
                            - optional
                      npm_package_recent_release_guard:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                          type:
                            nullable: true
                            type: string
                            enum:
                            - required
                            - optional
                          settings:
                            type: object
                            properties:
                              cooldown_period_in_days:
                                description: Number of days a new package release must age before it is allowed
                                type: integer
                              exempted_packages:
                                description: List of npm packages exempted from this check
                                type: array
                                items:
                                  type: string
                      pwn_request_check:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                          type:
                            nullable: true
                            type: string
                            enum:
                            - required
