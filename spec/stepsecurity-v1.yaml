  /github/{owner}/actions/maintained-actions:
    get:
      tags:
      - Actions
      summary: Get status of maintained actions
      description: Retrieve the status of all requested maintained actions to check if they have been onboarded or are still in the requested state
      operationId: get_github_owner_actions_maintained_actions
      parameters:
      - in: path
        name: owner
        description: GitHub Organization
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: Successfully retrieved maintained actions status
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    owner:
                      example: step-security
                      description: GitHub organization name
                      type: string
                    action_name:
                      example: nick-fields/retry
                      description: Original GitHub Action name that was requested
                      type: string
                    maintained_action_name:
                      example: step-security/maintained-retry
                      description: Name of the maintained action (empty if still requested)
                      type: string
                    email_from_api:
                      example: user@example.com
                      description: Email address provided when requesting the action
                      type: string
                    email_from_user:
                      example: user@example.com
                      description: User's email from their profile (populated when onboarded)
                      type: string
                    login:
                      example: github-user
                      description: GitHub username of the requester
                      type: string
                    status:
                      example: requested
                      description: |
                        Current status of the maintained action request:
                        - requested: Initial state when the action is requested
                        - onboarded: Action has been successfully onboarded and is available
                        - alternate_recommended: An alternate action from GitHub is recommended instead (e.g., using actions/create-github-app-token instead of tibdex/github-app-token)
                        - not_recommended: Action should not be used (e.g., can bypass GitHub and StepSecurity allow list features)
                        - cannot_onboard: Action cannot be onboarded (source code not available, only dist is available)
                      type: string
                      enum:
                      - requested
                      - onboarded
                      - alternate_recommended
                      - not_recommended
                      - cannot_onboard
                    requested_at:
                      example: 1704067200
                      description: Unix timestamp when the action was requested
                      type: integer
                    onboarded_at:
                      example: 0
                      description: Unix timestamp when the action was onboarded (0 if not onboarded)
                      type: integer
              examples:
                requested_state:
                  summary: Requested State Example
                  value:
                  - action_name: nick-fields/retry
                    email_from_api: user@example.com
                    email_from_user: ''
                    login: github-user
                    maintained_action_name: ''
                    onboarded_at: 0
                    owner: step-security
                    requested_at: 1704067200
                    status: requested
                onboarded_state:
                  summary: Onboarded State Example
                  value:
                  - action_name: nick-fields/retry
                    email_from_api: user@example.com
                    email_from_user: user@example.com
                    login: github-user
                    maintained_action_name: step-security/maintained-retry
                    onboarded_at: 1704153600
                    owner: step-security
                    requested_at: 1704067200
                    status: onboarded
                alternate_recommended_state:
                  summary: Alternate Recommended State Example
                  description: When a customer requests an action and an alternate action from GitHub is recommended
                  value:
                  - action_name: tibdex/github-app-token
                    email_from_api: user@example.com
                    email_from_user: ''
                    login: github-user
                    maintained_action_name: ''
                    onboarded_at: 0
                    owner: step-security
                    requested_at: 1704067200
                    status: alternate_recommended
                not_recommended_state:
                  summary: Not Recommended State Example
                  description: When an action should not be used as it can bypass security features
                  value:
                  - action_name: Wandalen/wretry.action
                    email_from_api: user@example.com
                    email_from_user: ''
                    login: github-user
                    maintained_action_name: ''
                    onboarded_at: 0
                    owner: step-security
                    requested_at: 1704067200
                    status: not_recommended
                cannot_onboard_state:
                  summary: Cannot Onboard State Example
                  description: When source code for the action is not available (only dist is available)
                  value:
                  - action_name: some-org/binary-only-action
                    email_from_api: user@example.com
                    email_from_user: ''
                    login: github-user
                    maintained_action_name: ''
                    onboarded_at: 0
                    owner: step-security
                    requested_at: 1704067200
                    status: cannot_onboard
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
    post:
      tags:
      - Actions
      summary: Request a maintained action
      description: Request StepSecurity to maintain and monitor a specific GitHub Action
      operationId: post_github_owner_actions_maintained_actions
