      description: Update the GitHub Checks configuration for the organization. Accepts the full configuration object.
      operationId: updateGithubChecksConfig
      parameters:
      - in: path
        name: owner
        description: GitHub Organization
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enable_baseline_check_for_all_new_repos:
                  nullable: true
                  description: Whether to enable baseline check for all new repositories
                  type: boolean
                enable_required_checks_for_all_new_repos:
                  nullable: true
                  description: Whether to enable required checks for all new repositories
                  type: boolean
                enable_optional_checks_for_all_new_repos:
                  nullable: true
                  description: Whether to enable optional checks for all new repositories
                  type: boolean
                custom_description:
                  description: Custom description shown in check run output
                  type: string
                checks:
                  type: object
                  properties:
                    npm_package_compromised_updates:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        type:
                          nullable: true
                          type: string
                          enum:
                          - required
                          - optional
                    npm_package_recent_release_guard:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        type:
                          nullable: true
                          type: string
                          enum:
                          - required
                          - optional
                        settings:
                          type: object
                          properties:
                            cooldown_period_in_days:
                              description: Number of days a new package release must age before it is allowed
                              type: integer
                            exempted_packages:
                              description: List of npm packages exempted from this check
                              type: array
                              items:
                                type: string
                    pwn_request_check:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        type:
                          nullable: true
                          type: string
                          enum:
                          - required
                          - optional
                    script_injection_check:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        type:
                          nullable: true
                          type: string
                          enum:
                          - required
                          - optional
                repos:
                  description: Per-repository check settings, keyed by repository name
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      baseline:
                        description: Whether baseline check is enabled for this repository
                        type: boolean
                      run_required_checks:
                        description: Whether required checks are enabled for this repository
                        type: boolean
                      run_optional_checks:
                        description: Whether optional checks are enabled for this repository
                        type: boolean
            example:
              checks:
                npm_package_compromised_updates:
                  enabled: true
                  type: required
                npm_package_recent_release_guard:
                  enabled: true
                  settings:
                    cooldown_period_in_days: 7
                    exempted_packages:
                    - lodash
                    - express
                  type: optional
                pwn_request_check:
                  enabled: true
                  type: required
                script_injection_check:
                  enabled: true
                  type: required
              custom_description: Security checks enforced by the platform team
              enable_baseline_check_for_all_new_repos: true
              enable_optional_checks_for_all_new_repos: false
              enable_required_checks_for_all_new_repos: true
              repos:
                my-repo:
                  baseline: true
                  run_optional_checks: false
