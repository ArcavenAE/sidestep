          content:
            application/json:
              schema:
                type: object
                properties:
                  report_id:
                    type: string
                    description: "Unique identifier for the report — use this to poll status"
                    example: "e4554b64-a07e-4c83-b823-0c0b49666116"
                  org:
                    type: string
                    example: "step-integration-tests"
                  status:
                    type: string
                    enum: ["pending", "processing", "completed", "failed"]
                    example: "pending"
                  message:
                    type: string
                    example: "PDF report generation has been queued"
        "401":
          description: "Unauthorized"
        "500":
          description: "Internal Server Error"

  /github/{owner}/actions/report/{id}:
    get:
      tags:
        - "Reports"
      summary: "Get report status"
      description: >
        Check the status of a previously requested report. Once completed, includes
        a download URL for the PDF.
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          description: "GitHub Organization"
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: "Report ID returned from the generate endpoint"
          schema:
            type: string
      responses:
        "200":
          description: "Report status retrieved successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_id:
                    type: string
                    example: "rpt-abc123"
                  org:
                    type: string
                    example: "step-security"
                  status:
                    type: string
                    enum: ["pending", "processing", "completed", "failed"]
                    example: "completed"
                  download_url:
                    type: string
                    description: "Pre-signed URL to download the PDF (only present when status is completed)"
                    example: "https://s3.amazonaws.com/..."
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:00:00Z"
                  completed_at:
                    type: string
                    format: date-time
                    nullable: true
                    example: "2024-01-15T10:02:30Z"
                  error:
                    type: string
                    nullable: true
                    description: "Error message if status is failed"
              examples:
                completed:
                  summary: "Completed report — download_url contains a pre-signed S3 URL (expires in 1 hour)"
                  value:
                    report_id: "e4554b64-a07e-4c83-b823-0c0b49666116"
                    org: "step-integration-tests"
                    status: "completed"
                    download_url: "https://pdf-reports-XXXX.s3.us-west-2.amazonaws.com/pdf/my-org/my-org_report_20260330.pdf?X-Amz-Algorithm=..."
                    created_at: "2026-03-30T04:53:59.141154062Z"
                    completed_at: "2026-03-30T04:54:02.304480567Z"
                pending:
                  summary: "Pending report — poll again until status changes"
                  value:
                    report_id: "e4554b64-a07e-4c83-b823-0c0b49666116"
                    org: "step-integration-tests"
                    status: "pending"
                    download_url: null
                    created_at: "2026-03-30T04:53:59.141154062Z"
                    completed_at: null
        "401":
          description: "Unauthorized"
        "404":
          description: "Report not found"
        "500":
          description: "Internal Server Error"

