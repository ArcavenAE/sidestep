  /github/{owner}/packages/pypi/search:
    post:
      tags:
        - "OSS Package Security"
      summary: "Search PyPI packages for organization"
      description: |
        Search for specific PyPI packages used across an organization's GitHub
        repositories, with the same filtering options as the NPM equivalent
        (specific packages and versions, time range, PR-only visibility).

        Package names are case-sensitive and match the canonical PyPI name
        (for example `Flask` or `requests`).
      operationId: "searchGhOrgPypiPackages"
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          description: "GitHub Organization"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                owner:
                  type: string
                  description: "GitHub organization/owner name (must match the path parameter)"
                repo:
                  type: string
                  description: "Optional repository filter"
                packages:
                  type: array
                  items:
                    $ref: "#/components/schemas/PypiPackageFilter"
                  description: "Specific packages and optional versions to search for"
                start_time:
                  type: integer
                  description: "Unix timestamp for search start time"
                end_time:
                  type: integer
                  description: "Unix timestamp for search end time"
                seen_only_in_prs:
                  type: boolean
                  description: "Filter to packages seen only in pull requests"
                seen_only_in_default_branch:
                  type: boolean
                  description: "Filter to packages seen only on the default branch"
            examples:
              searchByPackageName:
                summary: "Search by package name across all versions"
                description: "Find every Flask and requests usage in the org"
                value:
                  owner: "my-org"
                  packages:
                    - package: "Flask"
                      versions: []
                    - package: "requests"
                      versions: []
              searchSpecificVersion:
                summary: "Search for a specific version"
                description: "Find every install of a particular package version"
                value:
                  owner: "my-org"
                  packages:
                    - package: "requests"
                      versions: ["2.31.0"]
                  seen_only_in_prs: true
      responses:
        "200":
          description: "Successfully retrieved matching PyPI packages"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PypiPackagesSearchResponse"
              examples:
                sampleResponse:
                  summary: "requests 2.31.0 found in a single repo"
                  value:
                    packages:
                      - owner: "my-org"
                        repo: "my-repo"
                        customer: "test-customer"
                        package: "requests"
                        version: "2.31.0"
                        version_constraint: "2.31.0"
                        seen_in_any_prs: true
                        last_seen_in_any_pr_at: 1704067200
                        prs:
                          "my-org/my-repo/3":
                            url: "https://github.com/my-org/my-repo/pull/3"
                            number: 3
                            created_at: 1703980800
                            updated_at: 1704067200
                            created_by: "john-doe"
                            title: "Create requirements.txt"
                            head_commit: "0ab9130fcca78924b9c561a358090ec792df152d"
                            previous_commits: null
                            files: ["requirements.txt"]
                        default_branch: ""
                        seen_in_default_branch: false
                        first_seen_in_default_branch: 0
                        last_seen_in_default_branch: 0
                        is_active_in_default_branch_in_any_file: false
                        source_files_info_in_default_branch: null
                        record_created_at: 1704067200
                        record_updated_at: 1704067200
                        expires_at: 1735689600
                        owner_repo: "my-org/my-repo"
                        owner_repo_package: "my-org/my-repo/requests"
                        owner_repo_package_version: "my-org/my-repo/requests@2.31.0"
                        repo_package: "my-repo/requests"
                        repo_package_version: "my-repo/requests@2.31.0"
                        package_with_version: "requests@2.31.0"
                        customer_owner: "test-customer/my-org"
