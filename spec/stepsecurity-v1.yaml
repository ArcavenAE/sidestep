  /{customer}/developer-mdm/python-packages:
    get:
      tags:
      - Dev Machine Guard
      summary: List all Python packages across devices
      description: |
        List every Python package observed across all devices in the tenant.
        Each item is one `(device_id, package_name, package_version)`
        observation, so the same package may appear multiple times — once per
        device where it is installed. Use the `nextToken` query parameter to
        page through results.
      operationId: get_customer_developer_mdm_python_packages
      parameters:
      - in: path
        name: customer
        description: Customer/tenant identifier
        required: true
        schema:
          type: string
        style: simple
      - in: query
        name: nextToken
        description: Opaque pagination token returned in the previous response. Omit on the first page.
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Python packages retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    description: Number of items in this page
                    type: integer
                  nextToken:
                    nullable: true
                    description: Pass this back as `nextToken` to fetch the next page; absent/empty when there are no more pages
                    type: string
                  packages:
                    type: array
                    items:
                      $ref: '#/components/schemas/DevMdmPythonPackageInstall'
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
  /{customer}/developer-mdm/python-packages/search:
    post:
      tags:
      - Dev Machine Guard
      summary: Bulk search Python packages across all devices
      description: |
        Search for multiple Python packages across every device in the tenant.
        Returns one `results` entry per matching `(package_name,
        package_version)` pair, with the full list of device installations.
      operationId: post_customer_developer_mdm_python_packages_search
      parameters:
      - in: path
        name: customer
        description: Customer/tenant identifier
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                packages:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        description: PyPI package name (case-sensitive, e.g., `Flask`)
                        type: string
                      version:
                        description: Optional version. Omit to match any version.
                        type: string
            examples:
              flaskAndRequests:
                summary: Search for Flask and a specific requests version
                value:
                  packages:
                  - name: Flask
                  - name: requests
                    version: 2.31.0
        required: true
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    nullable: true
                    type: array
                    items:
                      type: object
                      properties:
                        package_name:
                          type: string
                        package_version:
                          type: string
                        installations:
                          type: array
                          items:
                            $ref: '#/components/schemas/DevMdmPythonPackageInstall'
                        count:
                          description: Number of device installations of this `(package_name, package_version)`
                          type: integer
                  total_results:
                    type: integer
              examples:
                flaskHit:
                  summary: Flask 3.1.2 found on one device
                  value:
                    results:
                    - count: 1
                      installations:
                      - agent_version: 1.10.0
                        collected_at: 1704067200
                        customer: test-customer
                        customer_device: test-customer#D1234EXAMPLE
                        device_id: D1234EXAMPLE
                        expires_at: 1735689600
                        first_seen_at: 1703980800
                        hostname: john-doe-MacBook.local
                        is_active: true
                        is_global: false
                        last_seen_at: 1704067200
                        os_version: '26.4'
                        package_manager: pip
                        package_name: Flask
                        package_version: 3.1.2
                        package_with_version: Flask@3.1.2
                        platform: darwin
                        project_paths:
                        - package_manager: pip
                          path: /Users/john-doe/projects/web-app/.venv
                        record_created_at: 1703980800
                        record_updated_at: 1704067200
                        user_identity: john-doe
                      package_name: Flask
                      package_version: 3.1.2
                    total_results: 1
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
