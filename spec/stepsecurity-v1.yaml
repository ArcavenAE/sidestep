          description: User identity associated with the device
          type: string
        package_name:
          description: PyPI package name
          type: string
        package_version:
          description: Installed package version
          type: string
        package_manager:
          example: pip
          description: Package manager that installed the package (e.g., `pip`, `uv`, `poetry`, `conda`)
          type: string
        is_global:
          description: Whether the package is installed globally on the device (vs. inside a virtualenv/project)
          type: boolean
        project_paths:
          nullable: true
          description: Local project paths where the package was observed
          type: array
          items:
            type: object
            properties:
              path:
                description: Absolute path on the developer machine
                type: string
              package_manager:
                description: Package manager observed at this project path
                type: string
        collected_at:
          description: Unix timestamp when this observation was collected
          type: integer
          format: int64
        first_seen_at:
          description: Unix timestamp when this package was first seen on the device
          type: integer
          format: int64
        last_seen_at:
          description: Unix timestamp when this package was last seen on the device
          type: integer
          format: int64
        hostname:
          description: Hostname of the developer device
          type: string
        platform:
          description: Operating system platform (e.g., `darwin`, `linux`, `windows`)
          type: string
        os_version:
          description: Operating system version
          type: string
        agent_version:
          description: StepSecurity agent version on the device
          type: string
        expires_at:
          description: Unix timestamp when the record expires
          type: integer
          format: int64
        record_created_at:
          description: Unix timestamp when the record was created
          type: integer
          format: int64
        record_updated_at:
          description: Unix timestamp when the record was last updated
          type: integer
          format: int64
        is_active:
          description: Whether the package is still active on the device as of `last_seen_at`
          type: boolean
    NotificationSettings:
      type: object
      properties:
        owner:
          example: myorg
          description: GitHub organization owner
          type: string
        repo:
          example: '*'
          description: Repository name or '*' for all repositories
          type: string
        slackWebhookURL:
          example: https://hooks.slack.com/services/SLACK-TEAM-EXAMPLE/SLACK-BOT-EXAMPLE/SLACK-WEBHOOK-EXAMPLE
          description: Slack webhook URL for sending notifications (used with webhook method)
          type: string
        teamsWebhookURL:
          example: https://outlook.office.com/webhook/...
          description: Microsoft Teams webhook URL for sending notifications
          type: string
        email:
          example: security@example.com
          description: Email address for notifications
          type: string
        notifyWhenDomainBlocked:
          example: 'true'
          description: Send notification when a domain is blocked
          type: string
        notifyOnFileOverwrite:
          example: 'true'
          description: Send notification when a file is overwritten
          type: string
        notifyWhenEndpointDiscovered:
          example: 'true'
          description: Send notification when a new endpoint is discovered
          type: string
        notifyForHttpsDetections:
          example: 'true'
          description: Send notification for HTTPS detections
          type: string
        notifyForSecretsDetection:
          example: 'true'
          description: Send notification when secrets are detected
          type: string
        notifyForArtifactSecretsDetection:
          example: 'true'
          description: Send notification when secrets are detected in artifacts
          type: string
        notifyForImposterCommitsDetection:
          example: ''
          description: Send notification when imposter commits are detected
          type: string
        notifyForSuspiciousNetworkCall:
          example: ''
          description: Send notification for suspicious network calls
          type: string
        notifyForSuspiciousProcessEvents:
          example: ''
          description: Send notification for suspicious process events
          type: string
        notifyForHardenRunnerConfigChanged:
          example: ''
          description: Send notification when Harden Runner configuration changes
          type: string
        notifyForNonCompliantArtifacts:
          example: ''
          description: Send notification for non-compliant artifacts
          type: string
        notifyForBlockedRunPolicy:
          example: ''
          description: Send notification when a run is blocked by policy
          type: string
        exemptFiles:
          nullable: true
          description: List of files exempt from notifications
          type: array
          items:
            type: string
        slackNotificationMethod:
          example: webhook
          description: 'Method for Slack notifications: ''webhook'' uses slackWebhookURL, ''oauth'' uses slackChannelID'
          type: string
          enum:
          - webhook
          - oauth
        slackChannelID:
          example: C076L4GG1S9
          description: Slack channel ID for OAuth method (required when slackNotificationMethod is 'oauth')
          type: string
    PolicyDrivenPRConfig:
      type: object
      properties:
        full_repo_name:
          example: step-security/.github
          description: Full repository name in owner/repo format
          type: string
        policy_driven_pr_configuration:
          $ref: '#/components/schemas/PolicyDrivenPRConfiguration'
        pr_status:
          $ref: '#/components/schemas/PRStatus'
    PolicyDrivenPRConfiguration:
      type: object
      properties:
        use_repo_level_config:
          description: Whether to use repository-level configuration
          type: boolean
        use_org_level_config:
          description: Whether to use organization-level configuration
          type: boolean
        control_checks_config:
          $ref: '#/components/schemas/ControlChecksConfig'
        trigger_github_alert:
          description: When enabled, GitHub advanced alert is triggered for issues that are enabled
          type: boolean
        trigger_pr_instead_of_issue:
          description: Whether to create PRs instead of issues
          type: boolean
        control_settings:
          $ref: '#/components/schemas/ControlSettings'
      required:
      - use_repo_level_config
      - use_org_level_config
      - control_checks_config
      - trigger_github_alert
      - trigger_pr_instead_of_issue
    ControlChecksConfig:
      description: |
        Map of control check names to their issue/PR configuration.

        Supported control check names:
        - ActionsShouldBePinned: Ensures GitHub Actions are pinned to commit SHAs
        - AddWorkflows: Adds recommended security workflows
        - GitHubHostedRunnerShouldBeHardened: Ensures GitHub-hosted runners use Harden-Runner
        - GithubTokenShouldHaveMinPermission: Enforces minimal GITHUB_TOKEN permissions
        - MaintainedGitHubActionsShouldBeUsed: Checks for unmaintained actions
        - SecureDockerFile: Analyzes Dockerfiles for security best practices
        - UpdateDependabotFile: Configures Dependabot for dependency updates
        - UpdatePrecommitFile: Adds pre-commit hooks for security scanning

        Example: { "ActionsShouldBePinned": { "trigger_github_issue": true, "trigger_github_pr": false } }
      type: object
      additionalProperties:
        $ref: '#/components/schemas/CheckConfig'
    CheckConfig:
      type: object
      properties:
        trigger_github_issue:
          description: Whether to create a GitHub issue for this check
          type: boolean
        trigger_github_pr:
          description: Whether to create a GitHub PR for this check
          type: boolean
      required:
      - trigger_github_issue
      - trigger_github_pr
    ControlSettings:
      type: object
      properties:
        exempted_actions:
          description: List of GitHub Actions exempted from checks
          type: array
          items:
            type: string
        exempted_images:
          description: List of Docker images exempted from checks
          type: array
          items:
            type: string
        pin_to_immutable:
          nullable: true
          description: Whether to pin actions to immutable SHAs
          type: boolean
        actions_to_replace:
          example:
            dorny/paths-filter: step-security/paths-filter
            softprops/action-gh-release: step-security/action-gh-release
          description: Map of actions to replace with secure alternatives
          type: object
          additionalProperties:
            type: string
        labels_to_replace:
          example:
            self-hosted: ubuntu-latest
          description: Map of runner labels to replace
          type: object
          additionalProperties:
            type: string
        update_precommit_file:
          example:
            gitleaks: true
            shellcheck: true
            trailing-whitespace: false
          description: Map of pre-commit hooks to enable/disable
          type: object
          additionalProperties:
            type: boolean
        package_ecosystem:
          description: Package ecosystem configuration for Dependabot
          type: array
          items:
            $ref: '#/components/schemas/PackageEcosystem'
        add_workflows:
          description: Workflows to add
          type: string
        action_commit_map:
          description: Map of actions to specific commit SHAs for pinning
          type: object
          additionalProperties:
            type: string
        apply_issue_pr_config_for_all_repos:
          nullable: true
          description: Whether to apply issue/PR config to all repositories (applicable when repo is '[all]')
          type: boolean
        apply_issue_pr_config_for_all_repos_filter:
          $ref: '#/components/schemas/ApplyIssuePRConfigForAllReposFilter'
    PackageEcosystem:
      type: object
      properties:
        package:
          example: github-actions
          description: Package ecosystem name
          type: string
          enum:
          - github-actions
          - npm
          - pip
          - bundler
          - composer
          - docker
          - gradle
          - maven
          - nuget
          - cargo
          - gomod
        interval:
          example: daily
          description: Update check interval
          type: string
          enum:
          - daily
          - weekly
          - monthly
      required:
      - package
      - interval
    PRStatus:
      type: object
      properties:
        owner:
          description: Repository owner
          type: string
        repo:
          description: Repository name
          type: string
        status:
          description: Current status of the PR creation process
          type: string
          enum:
          - QUEUED
          - IN_PROGRESS
          - COMPLETED
          - FAILED
        additional_info:
          description: Additional information about the PR status
          type: string
        last_updated:
          description: Timestamp of last status update
          type: string
          format: date-time
    PolicyDrivenPRConfigRequest:
      description: Request body for creating/updating policy-driven PR configuration
      type: object
      properties:
        use_repo_level_config:
          nullable: true
          description: Whether to use repository-level configuration
          type: boolean
        use_org_level_config:
          nullable: true
          description: Whether to use organization-level configuration
          type: boolean
        control_checks_config:
          nullable: true
          description: Map of control check names to their configuration
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CheckConfig'
        trigger_github_alert:
          nullable: true
          description: Whether to trigger GitHub advanced alerts for enabled issues
          type: boolean
        trigger_pr_instead_of_issue:
          nullable: true
          description: Whether to create PRs instead of issues
          type: boolean
        control_settings:
          $ref: '#/components/schemas/ControlSettingsRequest'
    ControlSettingsRequest:
      description: Control settings for policy-driven PRs
      type: object
      properties:
        exempted_actions:
          description: List of GitHub Actions exempted from checks
          type: array
          items:
            type: string
        exempted_images:
          description: List of Docker images exempted from checks
          type: array
          items:
            type: string
        pin_to_immutable:
          nullable: true
          description: Whether to pin actions to immutable SHAs
          type: boolean
        actions_to_replace:
          description: Map of actions to replace with secure alternatives
          type: object
          additionalProperties:
            type: string
        labels_to_replace:
          description: Map of runner labels to replace
          type: object
          additionalProperties:
            type: string
        update_precommit_file:
          description: Pre-commit file hooks to update
          type: object
          additionalProperties:
            type: boolean
        package_ecosystem:
          description: Package ecosystem configuration for Dependabot
          type: array
          items:
            $ref: '#/components/schemas/PackageEcosystem'
        add_workflows:
          description: Workflows to add
          type: string
        action_commit_map:
          description: Map of actions to specific commit SHAs
          type: object
          additionalProperties:
            type: string
        apply_issue_pr_config_for_all_repos:
          nullable: true
          description: Whether to apply issue/PR config to all repositories (applicable when repo is '[all]')
          type: boolean
        apply_issue_pr_config_for_all_repos_filter:
          $ref: '#/components/schemas/ApplyIssuePRConfigForAllReposFilter'
    ApplyIssuePRConfigForAllReposFilter:
      description: Filter configuration for applying issue/PR config across all repositories
      type: object
      properties:
        repos_topics:
          example:
          - security
          - production
          description: Applies configuration to repositories having these topics
          type: array
          items:
            type: string
  securitySchemes:
    BearerAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Use 'Bearer {api_key}' format
