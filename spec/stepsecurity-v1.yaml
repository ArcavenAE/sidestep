          enum: ["low", "medium", "high", "critical"]
          example: "high"
        cve:
          type: string
          nullable: true
          description: "Associated CVE identifier"
          example: "CVE-2024-1234"
        cve_link:
          type: string
          nullable: true
          description: "Link to CVE details"
          example: "https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2024-1234"
        is_active:
          type: string
          description: "Whether the incident is currently active"
          enum: ["true", "false"]
