  /customers/{customer}/packages/pypi/search:
    post:
      tags:
      - OSS Package Security
      summary: Search PyPI packages for customer (tenant-level)
      description: Search for specific PyPI packages across every repository in the tenant, with the same filtering options as the NPM tenant-level search.
