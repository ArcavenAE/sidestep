      tags:
        - "Actions"
      summary: "Request a maintained action"
      description: "Request StepSecurity to maintain and monitor a specific GitHub Action"
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          description: "GitHub Organization"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action_name
                - email_address
              properties:
                action_name:
                  type: string
                  description: "The GitHub Action name (e.g., 'nick-fields/retry')"
                  example: "nick-fields/retry"
                email_address:
                  type: string
                  format: email
                  description: "Your email address for communication about the request"
                  example: "test@test.com"
            example:
              action_name: "nick-fields/retry"
              email_address: "test@test.com"
      responses:
        "200":
          description: "Maintained action request submitted successfully. Response body is `null`."
        "400":
          description: "Bad request - invalid action name or email format"
        "401":
          description: "Unauthorized"
        "500":
          description: "Internal Server Error"

  /{owner}/github-actions/llm-analysis-requests:
    post:
      tags:
        - "Actions"
      summary: "Request AI security analysis for a GitHub Action"
      description: >
        Triggers an AI-powered security analysis for a specific GitHub Action. The analysis runs
        asynchronously — check the result via the `POST /github/actions/action-details` endpoint
        by looking at the `llm_analysis_request` and `llm_analysis_report` fields.
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          description: "GitHub Organization"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action_name
              properties:
                action_name:
                  type: string
                  description: "The GitHub Action name to analyze (e.g., 'nick-fields/retry')"
                  example: "nick-fields/retry"
            example:
              action_name: "nick-fields/retry"
      responses:
        "202":
          description: "Analysis request accepted and queued for processing. Response body is `null`. Check results via `POST /github/actions/action-details` — the `llm_analysis_request` and `llm_analysis_report` fields will be populated once analysis completes."
        "409":
          description: "Analysis has already been requested for this action"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "llm analysis already requested for provided action"
        "429":
          description: "Daily analysis request limit exceeded for this organization"
        "400":
          description: "Bad request - action details not found"
        "401":
          description: "Unauthorized"

  /github/actions/maintained-actions:
    get:
      tags:
        - "Actions"
      summary: "Get catalog of all maintained actions"
      description: >
        Returns the full public catalog of all GitHub Actions maintained by StepSecurity.
        This endpoint does not require authentication.
      responses:
        "200":
          description: "Successfully retrieved maintained actions catalog"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    maintained_action_name:
                      type: string
                      description: "Name of the StepSecurity maintained action"
                      example: "step-security/add-pr-comment"
                    description:
                      type: string
                      description: "Description of the action"
                      example: "Add a comment to a pull request"
                    forked_from:
                      type: string
                      description: "Original action this was forked from"
                      example: "mshick/add-pr-comment"
                    score:
                      type: integer
                      description: "Security score (0-10)"
                      example: 9
              examples:
                catalog:
                  summary: "Maintained actions catalog"
                  value:
                    - maintained_action_name: "step-security/add-pr-comment"
                      description: "Add a comment to a pull request"
                      forked_from: "mshick/add-pr-comment"
                      score: 9
                    - maintained_action_name: "step-security/wait-for-secrets"
                      description: "Wait for secrets to be available"
                      forked_from: "step-security/wait-for-secrets"
                      score: 10
        "500":
          description: "Internal Server Error"

