  /github/{owner}/{repo}/checks/{head_sha}:
    get:
      tags:
      - GitHub Checks
      summary: Get all checks for a specific commit
      description: Retrieve all StepSecurity checks for a specific commit SHA, including check run details, anomalous endpoints, and individual check results.
      operationId: get_github_owner_repo_checks_head_sha
      parameters:
      - in: path
        name: owner
        description: GitHub Organization
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: repo
        description: GitHub Repository name
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: head_sha
        description: Git commit SHA
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: Successfully retrieved checks for the commit
          content:
            application/json:
              schema:
                type: object
                properties:
                  checks:
                    type: array
                    items:
                      type: object
                      properties:
                        owner:
                          type: string
                        repo:
                          type: string
                        pr_number:
                          type: integer
                        head_sha:
                          type: string
                        pr_title:
                          type: string
                        pr_user:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        check_runs:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                description: GitHub check run ID
                                type: integer
                                format: int64
                              check_name:
                                description: e.g., 'StepSecurity Harden-Runner' or 'StepSecurity Required/Optional Checks'
                                type: string
                              check_type:
                                description: e.g., 'harden-runner baseline' or 'required'
                                type: string
                              created_at:
                                type: string
                                format: date-time
                              baseline_check:
                                nullable: true
                                description: Present for harden-runner baseline checks — contains anomalous and blocked endpoints
                                type: array
                                items:
                                  type: object
                                  properties:
                                    check_id:
                                      type: integer
                                      format: int64
                                    anomalous_endpoints:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          workflow:
                                            type: string
                                          workflow_url:
                                            type: string
                                          job_id:
                                            type: string
                                          run_id:
                                            type: string
                                          endpoint:
                                            type: string
                                          is_approved:
                                            type: boolean
                                          approved_by:
                                            type: string
                                          description:
                                            description: Approval comment
                                            type: string
                                    blocked_endpoints:
                                      nullable: true
                                      type: array
                                      items:
                                        type: object
                              conclusion:
                                type: string
                              status:
                                type: string
                              individual_check_results:
                                description: Present for required checks — results of each sub-check
                                type: array
                                items:
                                  type: object
                                  properties:
                                    check_name:
                                      type: string
                                    state:
                                      type: string
                                    success:
                                      type: boolean
                                    error:
                                      type: string
                              check_error:
                                type: string
                        stats:
                          type: object
                          properties:
                            total_checks:
                              type: integer
                            success:
                              type: integer
                            failure:
                              type: integer
                            in_progress:
                              type: integer
                            queued:
                              type: integer
                        approved:
                          type: boolean
                        approved_by:
                          type: string
                        cancelled:
                          type: boolean
                        cancelled_by:
                          type: string
                        conclusion:
                          type: string
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
    post:
      tags:
      - GitHub Checks
      summary: Approve or cancel all checks for a commit
      description: |
        Approve or cancel all StepSecurity check runs for a specific commit SHA. This is the primary endpoint used by the dashboard to approve checks of any type (Harden-Runner baseline checks, Required/Optional Checks, etc.). For baseline checks with anomalous endpoints, approval automatically marks all anomalous endpoints as approved and updates the GitHub check run.
      operationId: post_github_owner_repo_checks_head_sha
      parameters:
      - in: path
        name: owner
        description: GitHub Organization
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: repo
        description: GitHub Repository name
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: head_sha
        description: Git commit SHA
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                approved:
                  description: Set to `true` to approve all checks for this commit
                  type: boolean
                cancelled:
                  description: Set to `true` to cancel all checks for this commit
                  type: boolean
                endpoint_approval_comment:
                  example:
                    github.com:443: expected
                    url.com:443: added from tests
                  description: Optional map of endpoint (host:port) to approval comment. Only applicable when `approved` is `true`, anomalous endpoints were detected, and the baseline check has failed.
                  type: object
                  additionalProperties:
                    type: string
            examples:
              approve:
                summary: Approve all checks
                value:
                  approved: true
              approve_with_comments:
                summary: Approve checks with per-endpoint comments (when anomalous endpoints detected and baseline check failed)
                value:
                  approved: true
                  endpoint_approval_comment:
                    github.com:443: expected
                    url.com:443: added from tests
              cancel:
                summary: Cancel all checks
                value:
                  cancelled: true
        required: true
      responses:
        '200':
          description: Checks updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    example: Check runs updated successfully
                    type: string
        '400':
          description: Bad request — both approved and cancelled cannot be true
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
      security:
      - BearerAuth: []
  /github/{owner}/checks/config:
