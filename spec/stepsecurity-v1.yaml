  /github/{owner}/actions/policies/{policy_name}/attach:
    post:
      tags:
        - "Harden Runner"
      summary: "Attach policy to targets"
      description: "Attach an existing policy to specific targets (workflows, repositories, organization, or cluster)"
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: owner
          required: true
          description: "GitHub Organization"
          schema:
            type: string
          example: "myorg"
        - in: path
          name: policy_name
          required: true
          description: "Name of the policy to attach"
          schema:
            type: string
          example: "my-policy"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyAttachmentRequest"
            examples:
              attach_to_workflows:
                summary: "Attach to Specific Workflows"
                description: "Attach policy to specific workflows across multiple repositories"
                value:
                  org:
                    name: "myorg"
                    apply_to_org: false
                    repos:
                      - name: "frontend-app"
                        apply_to_repo: false
                        workflows: ["ci.yml", "deploy.yml"]
                      - name: "backend-api"
                        apply_to_repo: false
                        workflows: ["test.yml"]
                      - name: "shared-libs"
                        apply_to_repo: false
                        workflows: ["build.yml"]
              attach_to_repositories:
                summary: "Attach to Entire Repositories"
                description: "Attach policy to all workflows within specific repositories"
                value:
                  org:
                    name: "myorg"
                    apply_to_org: false
                    repos:
                      - name: "frontend-app"
                        apply_to_repo: true
                      - name: "backend-api"
                        apply_to_repo: true
                      - name: "shared-libs"
                        apply_to_repo: true
              attach_to_organization:
                summary: "Attach to Entire Organization"
                description: "Attach policy to entire organization (all repositories and workflows)"
                value:
                  org:
                    name: "myorg"
                    apply_to_org: true
              attach_to_mixed_targets:
                summary: "Attach to Mixed Targets"
                description: "Attach policy to combination of specific workflows and entire repositories"
                value:
                  org:
                    name: "myorg"
                    apply_to_org: false
                    repos:
                      - name: "frontend-app"
                        apply_to_repo: true
                      - name: "backend-api"
                        apply_to_repo: false
                        workflows: ["ci.yml", "security-scan.yml"]
              attach_to_clusters:
                summary: "Attach to Self-Hosted Runner Clusters"
                description: "Attach policy to specific self-hosted runner clusters"
                value:
                  clusters:
                    - "production-k8s-cluster"
                    - "staging-docker-runners"
                    - "gpu-ml-cluster"
      responses:
        "200":
          description: "Policy attached successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyAttachmentResponse"
        "400":
          description: "Bad Request - Invalid request format or missing required fields"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
              examples:
                missing_organization:
                  summary: "Missing organization configuration"
                  value:
                    error: "Either 'org' or 'clusters' must be specified"
                invalid_org_structure:
                  summary: "Invalid organization structure"
                  value:
                    error: "Organization name is required when specifying org configuration"
                empty_workflows:
                  summary: "Empty workflows list"
                  value:
                    error: "workflows array cannot be empty when apply_to_repo is false"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "404":
          description: "Policy not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "409":
          description: "Conflict - Resource already has another policy attached"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
              examples:
                repository_conflict:
                  summary: "Repository has conflicting policy"
                  value:
                    message: "conflict: Repository 'frontend-app' already has policy 'security-policy' attached"
                workflow_conflict:
                  summary: "Workflow has conflicting policy"
                  value:
                    message: "conflict: Workflow 'frontend-app/ci.yml' already has policy 'build-policy' attached"
                cluster_conflict:
                  summary: "Cluster has conflicting policy"
                  value:
                    message: "conflict: Cluster 'production-k8s-cluster' already has policy 'cluster-policy' attached"
        "500":
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

    delete:
      tags:
        - "Harden Runner"
      summary: "Detach policy from targets"
      description: "Remove attachment from a policy, keeping the policy definition intact"
      security:
        - BearerAuth: []
      parameters:
        - in: path
