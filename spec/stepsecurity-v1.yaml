        - name: conclusion
          in: query
          required: false
          schema:
            type: string
          description: "Filter by check conclusion (e.g., `success`, `failure`)"
        - name: start_time
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: "Start time as Unix timestamp (seconds)"
        - name: end_time
          in: query
