          in: path
          required: true
          description: "GitHub Organization"
          schema:
            type: string
      responses:
        "200":
          description: "Successfully retrieved maintained actions status"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    owner:
                      type: string
                      description: "GitHub organization name"
                      example: "step-security"
                    action_name:
                      type: string
                      description: "Original GitHub Action name that was requested"
                      example: "nick-fields/retry"
                    maintained_action_name:
                      type: string
                      description: "Name of the maintained action (empty if still requested)"
                      example: "step-security/maintained-retry"
                    email_from_api:
                      type: string
                      description: "Email address provided when requesting the action"
                      example: "user@example.com"
                    email_from_user:
                      type: string
                      description: "User's email from their profile (populated when onboarded)"
                      example: "user@example.com"
                    login:
                      type: string
                      description: "GitHub username of the requester"
                      example: "github-user"
                    status:
                      type: string
                      enum:
                        [
                          "requested",
                          "onboarded",
                          "alternate_recommended",
                          "not_recommended",
                          "cannot_onboard"
                        ]
                      description: |
                        Current status of the maintained action request:
                        - requested: Initial state when the action is requested
                        - onboarded: Action has been successfully onboarded and is available
                        - alternate_recommended: An alternate action from GitHub is recommended instead (e.g., using actions/create-github-app-token instead of tibdex/github-app-token)
                        - not_recommended: Action should not be used (e.g., can bypass GitHub and StepSecurity allow list features)
                        - cannot_onboard: Action cannot be onboarded (source code not available, only dist is available)
                      example: "requested"
                    requested_at:
                      type: integer
                      description: "Unix timestamp when the action was requested"
                      example: 1704067200
                    onboarded_at:
                      type: integer
                      description: "Unix timestamp when the action was onboarded (0 if not onboarded)"
                      example: 0
              examples:
                requested_state:
                  summary: "Requested State Example"
                  value:
