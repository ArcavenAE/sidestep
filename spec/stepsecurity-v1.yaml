        other Python package managers, both globally and inside project
        virtualenvs.
      security:
        - BearerAuth: []
      parameters:
        - name: customer
          in: path
          required: true
          description: "Customer/tenant identifier"
          schema:
            type: string
        - name: device_id
          in: path
          required: true
          description: "Device identifier (UUID or platform-specific serial)"
          schema:
            type: string
        - name: package
          in: query
          required: false
          schema:
            type: string
          description: "Filter by package name (case-sensitive PyPI name, e.g., `Flask`)"
        - name: version
          in: query
          required: false
          schema:
            type: string
          description: "Filter by version"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
          description: "Maximum results"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: ["active", "inactive"]
          description: "Filter by activity status"
        - name: nextToken
          in: query
          required: false
          schema:
            type: string
          description: "Opaque pagination token returned in the previous response. Omit on the first page."
      responses:
        "200":
          description: "Python packages retrieved successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
