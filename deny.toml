[licenses]
# Permissive-only by default. Copyleft (including weak/file-level MPL-2.0)
# requires an explicit per-crate exception below.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-3.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "Zlib",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# Per-crate exceptions for non-permissive licenses. Each entry must
# document why this specific crate is accepted at this license.
[[licenses.exceptions]]
# progenitor's runtime client. Required for the spec-driven codegen
# pipeline (see charter B2). MPL-2.0 is file-level copyleft only;
# unmodified use as a dependency is unrestricted.
name = "progenitor-client"
allow = ["MPL-2.0"]

[[licenses.exceptions]]
# Transitive via the `dirs` crate (XDG path resolution). Mozilla-origin
# helper for Option<T> ergonomics. MPL-2.0 file-level copyleft, unmodified.
name = "option-ext"
allow = ["MPL-2.0"]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
