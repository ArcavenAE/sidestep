pre-commit:
  parallel: true
  commands:
    fmt:
      run: cargo +nightly fmt --all -- --check
    clippy:
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    deny:
      run: cargo deny check advisories licenses bans

pre-push:
  commands:
    test:
      run: cargo test --workspace --all-targets
    doctest:
      # See ci.yml — `--exclude sidestep-api` skips progenitor's
      # generated illustrative doctests.
      run: cargo test --workspace --doc --exclude sidestep-api
