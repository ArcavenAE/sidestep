id: question-audit-mining
type: question
confidence: frontier
title: "Audit-trail pattern-mining surface — what tooling reads the JSONL?"
content: |
  Once the audit trail is emitting in production (it is, as of the SDK
  MVP), the second-order question is what tooling reads it.

  Candidates:
  - `sidestep audit query` — local aggregation, e.g.
    `--since 7d --group-by operation.id`.
  - `sidestep audit traces` — render trace_id trees so a "triage
    session" appears as a coherent unit.
  - `sidestep meta propose` — LLM call against a window of trail to
    suggest curated verbs that compose hot operation sequences.
  - flyloft catalog adapter — battens that index audit lines so an
    LLM can `fly` against them (depends on flyloft maturity).

  Out of scope for v0.1; design once the trail has weeks of data.
  The schema's stable join keys (`operation.id`, `trace_id`,
  `shape_hash`) are designed to enable any of these without a schema
  change.

  **Session-045 update:** noise floor matters as much as feature
  richness. `aae-orc-y7lq` (owner/customer resolution chain) was
  filed after session-045 noticed that `path_params.owner` would be
  a constant-valued field on every line of the dataset, drowning
  per-call intent. The mining threshold (~200 distinct
  `predicate_text` × 10 contexts) is reachable faster when the
  signal isn't competing with constants. `path_params_source.owner`
  (additive audit field per finding-002) lets miners separate
  constant defaults from per-call intent. `val-resolution-chain` is
  the value that produced this insight.

  **Session-041 update:** `elem-primitives-over-composites` (B6)
  extends the audit schema with 8 additive fields specifically
  designed to make `meta propose` tractable: `verb_phase`,
  `synthesis_keys`, `recipe_id`, `step_index`, `predicate_text`,
  `predicate_ast_shape`, `field_paths_referenced`,
  `literal_values_by_path`, `predicate_outcome`, `retry_chain_id`,
  `time_to_next_invocation`. The first concrete consumer is
  `aae-orc-vjc6` (CEL sugar layer designed from audit-trail
  evidence) — clusters predicates by `predicate_ast_shape`, mines
  `field_paths_referenced` for compound flag candidates. Murat's
  threshold for v0.2 sugar design: ~200 distinct `predicate_text`
  values × ≥10 invocation contexts (~8-12 weeks of dogfooding).
